<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#181817">
<title>NeusicWave Suite</title>
<link rel="stylesheet" href="/NeusicLabV1/app/css/30-nw-tokens.css">
<style>
:root{--rail-h:52px}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#181817;font-family:"Arial Narrow","Roboto Condensed",system-ui,sans-serif}#suite-rail{position:fixed;inset:0 0 auto 0;z-index:20;height:var(--rail-h);display:flex;align-items:center;gap:4px;padding:6px max(8px,env(safe-area-inset-left));background:#181817f5;border-bottom:1px solid #ffffff18;overflow-x:auto;overflow-y:hidden;scrollbar-width:none}#suite-rail::-webkit-scrollbar{display:none}.brand{display:flex;align-items:center;gap:7px;flex:0 0 auto;margin-right:4px;color:#d6dad9;font-size:11px;font-weight:800;letter-spacing:.14em}.brand i{width:8px;height:8px;border-radius:50%;background:linear-gradient(90deg,#c97d5a,#b0b3b2,#d4a574)}.suite-tab,.home{flex:0 0 auto;min-height:40px;padding:0 12px;border:1px solid transparent;border-radius:5px;background:#252423;color:#9aa09d;font:800 10px/1 inherit;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.suite-tab.on{color:#fff;border-color:#ffffff24;background:#303432}.suite-tab[data-suite="live"].on{box-shadow:inset 0 -2px #c97d5a}.suite-tab[data-suite="wave"].on{box-shadow:inset 0 -2px #b0b3b2}.suite-tab[data-suite="studio"].on{box-shadow:inset 0 -2px #d4a574}.home{margin-left:auto}#frames{position:fixed;inset:var(--rail-h) 0 0}.suite-frame{position:absolute;inset:0;width:100%;height:100%;border:0;display:none;background:#181817}.suite-frame.on{display:block}#veil{position:fixed;inset:var(--rail-h) 0 0;z-index:10;display:grid;place-items:center;background:#181817;color:#8f9996;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;transition:opacity .2s}#veil.gone{opacity:0;pointer-events:none}@media(max-width:640px){:root{--rail-h:58px}.brand{font-size:9px}.suite-tab,.home{min-height:44px;padding:0 10px;font-size:9px}.home{margin-left:0}}
</style>
</head>
<body>
<nav id="suite-rail" aria-label="NeusicWave suite switcher"><span class="brand"><i></i>NEUSICWAVE</span><button class="suite-tab" data-suite="live">Live Loop</button><button class="suite-tab" data-suite="wave">Wave</button><button class="suite-tab" data-suite="studio">Studio</button><a class="home" href="/NeusicLabV1/">Hub</a></nav>
<div id="frames"></div><div id="veil">Loading suite…</div>
<script>
(()=>{'use strict';const apps={live:{src:'/NeusicLabV1/live-loop/',label:'Live Loop'},wave:{src:'/NeusicLabV1/wave-loom/',label:'Wave'},studio:{src:'/NeusicLabV1/studio/',label:'Studio'}};const frames={};const host=document.getElementById('frames');const veil=document.getElementById('veil');const getKey=()=>{const q=new URLSearchParams(location.search).get('suite');return apps[q]?q:'live'};function activate(key,push){if(!apps[key])key='live';let frame=frames[key];if(!frame){frame=document.createElement('iframe');frame.className='suite-frame';frame.title=apps[key].label;frame.allow='microphone; autoplay; clipboard-write';frame.src=apps[key].src;frame.addEventListener('load',()=>veil.classList.add('gone'),{once:true});frames[key]=frame;host.appendChild(frame)}Object.entries(frames).forEach(([name,item])=>item.classList.toggle('on',name===key));document.querySelectorAll('.suite-tab').forEach(button=>button.classList.toggle('on',button.dataset.suite===key));document.title='NeusicWave — '+apps[key].label;if(push){const url=new URL(location.href);url.searchParams.set('suite',key);history.pushState({suite:key},'',url)}setTimeout(()=>veil.classList.add('gone'),2500)}document.querySelectorAll('.suite-tab').forEach(button=>button.addEventListener('click',()=>activate(button.dataset.suite,true)));addEventListener('popstate',()=>activate(getKey(),false));activate(getKey(),false)})();
</script>
</body>
</html>
