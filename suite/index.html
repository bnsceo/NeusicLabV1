<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neusic Suite — LIVE · WAVE · STUDIO</title>
  <link rel="stylesheet" href="../app/css/30-nw-tokens.css">
  <link rel="stylesheet" href="css/70-suite-shell.css">
</head>
<body>

  <!-- Master Utility Top Bar (Persistent Across All Suites) -->
  <header class="suite-topbar">
    <div class="topbar-left">
      <span class="brand-title">NEUSIC<span class="brand-sub">WAVE</span></span>
    </div>
    
    <!-- Central Trans-Engine Unified Transport Controls -->
    <div class="topbar-center">
      <div class="transport-control">
        <label for="suiteBpmSlider">BPM</label>
        <input type="range" id="suiteBpmSlider" min="40" max="240" value="120" step="1">
        <span id="suiteBpmValue" class="numeric-display">120</span>
      </div>
      
      <div class="time-sig-control">
        <select id="suiteTimeSig" aria-label="Global Time Signature">
          <option value="4/4">4 / 4</option>
          <option value="3/4">3 / 4</option>
          <option value="6/8">6 / 8</option>
        </select>
      </div>
      
      <div class="load-meter-wrapper" title="Global Audio Processing Load">
        <div class="load-meter-bar" style="width: 14%;"></div>
      </div>
    </div>
    
    <!-- Tactical Suite Matrix Switcher (Locked Hardware Palette Accents) -->
    <nav class="topbar-right" aria-label="Suite Matrix Switcher">
      <button class="suite-tab" data-suite="live" data-product="live">LIVE</button>
      <button class="suite-tab" data-suite="wave" data-product="wave">WAVE</button>
      <button class="suite-tab" data-suite="studio" data-product="studio">STUDIO</button>
    </nav>
  </header>

  <!-- Multi-Suite Frame Engine Container -->
  <main class="suite-container">
    <div class="suite-pane" id="pane-live" data-suite-view="live" data-src="../live-loop/"></div>
    <div class="suite-pane" id="pane-wave" data-suite-view="wave" data-src="../wave-loom/"></div>
    <div class="suite-pane" id="pane-studio" data-suite-view="studio" data-src="../studio/"></div>
  </main>

  <script src="js/70-suite-shell.js"></script>
</body>
</html>
