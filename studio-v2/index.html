<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#04060a">
  <meta name="description" content="Neusic Studio v2 mobile — a phone-first Wave-Native production environment.">
  <title>Neusic Studio v2 Mobile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="creator top" data-neusic-creator>Made by Anderson Paulino</div>
  <div class="creator bottom" data-neusic-creator>Made by Anderson Paulino</div>
  <div class="nebula" aria-hidden="true"></div>

  <main class="mobile-shell">
    <header class="mobile-topbar">
      <a class="brand" href="../" aria-label="Neusic home"><span>N</span><b>NEUSIC</b></a>
      <div class="transport">
        <button data-action="rewind" aria-label="Rewind">⏮</button>
        <button class="play" id="playButton" data-action="play" aria-label="Play">▶</button>
        <button class="record" id="recordButton" data-action="record" aria-label="Record">●</button>
      </div>
      <button class="menu-button" id="menuButton" aria-label="Open tools">•••</button>
    </header>

    <section class="mode-header">
      <div><small id="modeEyebrow">WAVE-NATIVE INSTRUMENT</small><h1 id="modeTitle">The Wave Loom</h1></div>
      <div class="status-pill"><i id="statusLed"></i><span id="statusText">READY</span></div>
    </section>

    <section class="engine-stage" id="engineStage">
      <iframe id="loomFrame" class="engine-frame active" src="../wave-loom/" title="Wave Loom" allow="microphone;autoplay;midi"></iframe>
      <iframe id="studioFrame" class="engine-frame" title="Neusic DAW engine" allow="microphone;autoplay;midi"></iframe>
      <div class="engine-loader hidden" id="engineLoader">
        <span></span><b>Preparing Neusic</b><small id="loaderText">The production engine loads only when you open a production mode.</small>
        <a href="../studio/">Open Classic Studio</a>
      </div>
    </section>

    <nav class="mode-dock" aria-label="Neusic mobile modes">
      <button class="active" data-mode="loom"><i>⌁</i><span>Loom</span></button>
      <button data-mode="arrange"><i>▦</i><span>Arrange</span></button>
      <button data-mode="perform"><i>◫</i><span>Perform</span></button>
      <button data-mode="piano"><i>▤</i><span>Piano</span></button>
      <button data-mode="record"><i>●</i><span>Record</span></button>
      <button data-mode="mix"><i>≋</i><span>Mix</span></button>
    </nav>
  </main>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <aside class="tool-sheet" id="toolSheet" aria-hidden="true">
    <div class="sheet-handle"></div>
    <header><div><small>PROJECT TOOLS</small><b>Neusic Actions</b></div><button id="closeSheet" aria-label="Close">×</button></header>
    <div class="action-grid">
      <button data-action="save"><i>⇩</i><span>Save</span></button>
      <button data-action="export"><i>↓</i><span>Export</span></button>
      <button data-action="undo"><i>↩</i><span>Undo</span></button>
      <button data-action="redo"><i>↪</i><span>Redo</span></button>
      <button data-action="theme"><i>◐</i><span>Theme</span></button>
      <button data-action="copilot"><i>AI</i><span>Copilot</span></button>
    </div>
    <h2>Add to project</h2>
    <div class="create-row">
      <button data-create="audio">Audio</button><button data-create="midi">Instrument</button><button data-create="beat">Drums</button><button data-create="bus">Bus</button>
    </div>
    <div class="sheet-links"><a href="../studio/">Classic Studio</a><a href="../wave-loom/">Wave Loom</a><a href="../">Landing</a></div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
