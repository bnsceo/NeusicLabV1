<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Neusic DAW</title>
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS — Dark Neumorphic
═══════════════════════════════════════════════ */
:root {
  --bg:   #1c1c2e;
  --bg1:  #23233a;
  --bg2:  #2a2a44;
  --bg3:  #32324e;
  --bgd:  #14142a;
  --nsl:  rgba(55,55,90,0.65);
  --nsd:  rgba(8,8,18,0.85);
  --acc:  #b06ef3;
  --acc2: #8b5cf6;
  --acc3: #7c3aed;
  --accg: rgba(176,110,243,0.3);
  --red:  #f87171;
  --redg: rgba(248,113,113,0.35);
  --grn:  #4ade80;
  --grng: rgba(74,222,128,0.28);
  --yel:  #fbbf24;
  --txt:  #d4d4ec;
  --txt2: #7878a0;
  --txt3: #44446a;
  --r:    12px;
  --rsm:  8px;
  --rlg:  18px;
  --hdr:  54px;
  --nav:  58px;
  --toolbar-h: 54px;
  --drawer-h: 310px;
  --track-h: 72px;
  --hdr-w: 152px;

  /* track palette */
  --c1:#2dd4bf; --c2:#fb923c; --c3:#a78bfa;
  --c4:#60a5fa; --c5:#f472b6; --c6:#34d399;
  --c7:#fbbf24; --c8:#f43f5e;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

html,body{height:100%;overflow:hidden;touch-action:none;}

body{
  background:var(--bg);
  color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
  font-size:13px;
  user-select:none;
  -webkit-user-select:none;
}

/* ── NEU HELPERS ── */
.nr{background:var(--bg1);box-shadow:4px 4px 10px var(--nsd),-3px -3px 8px var(--nsl);}
.ni{background:var(--bgd);box-shadow:inset 3px 3px 8px var(--nsd),inset -2px -2px 5px var(--nsl);}
.nf{background:var(--bg);box-shadow:2px 2px 6px var(--nsd),-1px -1px 4px var(--nsl);}

/* ═══════════════════════════════════════════════
   APP SHELL  — full-viewport flex column
═══════════════════════════════════════════════ */
#app{
  display:flex;flex-direction:column;
  height:100dvh;
  max-width:1400px;margin:0 auto;
  overflow:hidden;
}

/* ── TOP BAR ── */
#topbar{
  height:var(--hdr);flex-shrink:0;
  display:flex;align-items:center;gap:8px;
  padding:0 14px;
  background:var(--bg1);
  box-shadow:0 3px 12px var(--nsd),0 1px 0 var(--nsl);
  z-index:100;
}

.brand{
  font-size:20px;font-weight:900;letter-spacing:-1px;
  background:linear-gradient(135deg,var(--acc),#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;flex-shrink:0;margin-right:2px;
}

.tb-sep{width:1px;height:26px;background:var(--txt3);flex-shrink:0;}
.tb-spacer{flex:1;}

/* Transport buttons */
.tb-btn{
  width:32px;height:32px;border-radius:var(--rsm);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-family:inherit;transition:all .12s;
  background:var(--bg);color:var(--txt2);
  box-shadow:3px 3px 7px var(--nsd),-2px -2px 5px var(--nsl);
}
.tb-btn:active{box-shadow:inset 2px 2px 5px var(--nsd),inset -1px -1px 3px var(--nsl);transform:scale(.94);}
.tb-btn.play-active{background:var(--grn);color:#001;box-shadow:3px 3px 8px var(--nsd),0 0 12px var(--grng);}
.tb-btn.rec-active{background:var(--red);color:#fff;box-shadow:3px 3px 8px var(--nsd),0 0 14px var(--redg);animation:recpulse 1s infinite;}
.tb-btn.acc-btn{background:var(--acc2);color:#fff;box-shadow:3px 3px 8px var(--nsd),0 0 10px var(--accg);}

@keyframes recpulse{0%,100%{box-shadow:3px 3px 8px var(--nsd),0 0 14px var(--redg);}50%{box-shadow:3px 3px 8px var(--nsd),0 0 28px var(--redg);}}

/* Time / BPM chips */
.chip{
  display:flex;flex-direction:column;align-items:center;
  padding:4px 9px;border-radius:var(--rsm);cursor:default;
  background:var(--bgd);
  box-shadow:inset 2px 2px 6px var(--nsd),inset -1px -1px 4px var(--nsl);
  white-space:nowrap;
}
.chip-main{font-size:13px;font-weight:700;color:var(--txt);letter-spacing:.8px;font-variant-numeric:tabular-nums;line-height:1.2;}
.chip-sub{font-size:8px;color:var(--txt3);letter-spacing:.3px;}
.bpm-chip{cursor:pointer;}
.bpm-chip .chip-main{color:var(--acc);font-size:15px;}

/* Zoom / tool strip */
.zoom-group{display:flex;align-items:center;gap:4px;}
.zoom-btn{
  width:26px;height:26px;border-radius:6px;border:none;cursor:pointer;
  background:var(--bg);color:var(--txt2);font-size:14px;
  box-shadow:2px 2px 5px var(--nsd),-1px -1px 3px var(--nsl);
  display:flex;align-items:center;justify-content:center;transition:all .1s;
}
.zoom-btn:active{box-shadow:inset 1px 1px 4px var(--nsd);transform:scale(.9);}
.zoom-read{
  min-width:44px;height:26px;padding:0 7px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  background:var(--bgd);color:var(--txt2);font-size:10px;font-weight:800;font-variant-numeric:tabular-nums;
  box-shadow:inset 1px 1px 4px var(--nsd);
}

/* undo/redo badges */
.undo-count{
  position:absolute;top:-5px;right:-5px;
  width:16px;height:16px;border-radius:50%;
  background:var(--acc2);color:#fff;font-size:9px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 6px var(--accg);
}
.tb-btn-wrap{position:relative;}

/* ═══════════════════════════════════════════════
   MAIN CONTENT — sidebar + center or full
═══════════════════════════════════════════════ */
#main{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR (desktop ≥768px) ── */
#sidebar{
  width:200px;flex-shrink:0;
  background:var(--bg1);
  border-right:1px solid rgba(255,255,255,0.04);
  display:flex;flex-direction:column;
  overflow:hidden;
  transition:width .25s;
}
#sidebar.collapsed{width:50px;}
@media(max-width:767px){#sidebar{display:none;}}

.sb-section{font-size:9px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;padding:10px 12px 4px;}
.sb-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 6px;}
.sb-list::-webkit-scrollbar{width:2px;}
.sb-list::-webkit-scrollbar-thumb{background:var(--txt3);border-radius:1px;}
.sb-item{
  display:flex;align-items:center;gap:7px;padding:7px 8px;
  border-radius:var(--rsm);cursor:pointer;margin-bottom:2px;
  transition:background .1s;position:relative;
}
.sb-item:hover{background:var(--bg2);}
.sb-item.active{background:var(--bg3);}
.sb-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--acc);border-radius:0 3px 3px 0;}
.sb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sb-name{font-size:11px;font-weight:500;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

.sb-nav{padding:8px 6px;border-top:1px solid rgba(255,255,255,0.04);}
.sb-nav-btn{
  width:100%;display:flex;align-items:center;gap:8px;padding:7px 8px;
  border-radius:var(--rsm);border:none;background:none;
  color:var(--txt2);font-size:11px;font-weight:500;cursor:pointer;
  transition:all .12s;
}
.sb-nav-btn:hover{background:var(--bg2);color:var(--txt);}
.sb-nav-btn.active{background:var(--bg3);color:var(--acc);}
.sb-nav-btn .ni-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;}

/* ── CENTER ── */
#center{
  flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;
  background:
    linear-gradient(180deg,rgba(255,255,255,.025),transparent 72px),
    var(--bgd);
}

/* ── OVERVIEW ── */
#overview{
  height:38px;flex-shrink:0;margin:8px 12px 6px;
  border-radius:8px;cursor:crosshair;position:relative;overflow:hidden;
  background:
    linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px) 0 0/64px 100%,
    linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.015)),
    #17172a;
  border:1px solid rgba(255,255,255,.075);
  box-shadow:0 8px 22px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.055);
}
.ov-segs{position:absolute;inset:7px 8px;display:block;}
.ov-seg{
  position:absolute;height:5px;border-radius:999px;opacity:.82;
  box-shadow:0 0 10px color-mix(in srgb,currentColor 42%,transparent);
}
.ov-window{
  position:absolute;top:4px;bottom:4px;background:rgba(255,255,255,.075);
  border:1px solid rgba(255,255,255,.32);cursor:grab;border-radius:6px;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.2),0 0 18px rgba(176,110,243,.18);
}
.ov-cursor{
  position:absolute;top:3px;bottom:3px;width:2px;background:#fff;pointer-events:none;
  box-shadow:0 0 0 1px rgba(0,0,0,.45),0 0 10px rgba(255,255,255,.65);
}

/* ── RULER ── */
#ruler{
  height:32px;flex-shrink:0;display:flex;
  margin:0 12px;border-radius:8px 8px 0 0;
  background:linear-gradient(180deg,#22223a,#17172b);overflow:hidden;position:relative;
  border:1px solid rgba(255,255,255,.07);border-bottom:none;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
}
.ruler-pad{
  flex-shrink:0;border-right:1px solid rgba(255,255,255,.08);
  background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.01));
}
.ruler-canvas{flex:1;display:block;cursor:crosshair;}

/* ─── TRACKS AREA ─── */
#tracks-area{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  position:relative;margin:0 12px 10px;
  border:1px solid rgba(255,255,255,.07);border-top:none;border-radius:0 0 8px 8px;
  background:#151528;
  box-shadow:0 14px 32px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.025);
}

#tracks-scroll{
  flex:1;overflow:auto;position:relative;
  scrollbar-width:thin;scrollbar-color:var(--txt3) transparent;
  scroll-behavior:smooth;overscroll-behavior:contain;
}
#tracks-scroll::-webkit-scrollbar{width:8px;height:8px;}
#tracks-scroll::-webkit-scrollbar-track{background:rgba(255,255,255,.025);}
#tracks-scroll::-webkit-scrollbar-thumb{background:#4c4c70;border-radius:8px;border:2px solid #151528;}
#tracks-scroll::-webkit-scrollbar-thumb:hover{background:#666690;}

#tracks-inner{
  position:relative;min-width:100%;
  background:
    linear-gradient(90deg,rgba(255,255,255,.075) 1px,transparent 1px) var(--hdr-w) 0/calc(var(--beat-w,40px) * 4) 100%,
    linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px) var(--hdr-w) 0/var(--beat-w,40px) 100%;
}

/* ── TRACK ROW ── */
.track-row{
  display:flex;height:var(--track-h);
  border-bottom:1px solid rgba(255,255,255,.055);
  position:relative;
}
.track-row.selected .track-hdr{background:#2a2a42;}
.track-row:hover .track-hdr{background:#27273e;}
.track-row.selected .clip-lane{background-color:rgba(176,110,243,.035);}

/* Track header — sticky left */
.track-hdr{
  width:var(--hdr-w);flex-shrink:0;
  display:grid;grid-template-columns:30px minmax(0,1fr) auto;align-items:center;gap:7px;
  padding:8px 7px 8px 11px;
  background:linear-gradient(180deg,#24243a,#1d1d31);
  border-right:1px solid rgba(255,255,255,.08);
  cursor:pointer;position:sticky;left:0;z-index:10;
  transition:background .1s;
}
.track-color-bar{position:absolute;left:0;top:9px;bottom:9px;width:4px;border-radius:0 4px 4px 0;}
.track-icon{
  width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;
  box-shadow:0 4px 12px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.08);
}
.track-meta{flex:1;min-width:0;}
.track-num{font-size:8px;color:var(--txt2);font-weight:800;letter-spacing:.7px;text-transform:uppercase;}
.track-name{font-size:11px;font-weight:750;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}
.track-kind{font-size:8px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;}
.track-ctrls{display:flex;flex-direction:column;gap:5px;align-items:flex-end;}
.ms-row{display:flex;gap:3px;}
.btn-ms{
  width:20px;height:16px;border-radius:4px;border:1px solid rgba(255,255,255,.06);cursor:pointer;
  font-size:8px;font-weight:800;transition:all .1s;
  background:#151528;color:var(--txt2);
  box-shadow:none;
}
.btn-ms.m.on{background:var(--yel);color:#251500;border-color:transparent;box-shadow:0 0 8px rgba(251,191,36,.42);}
.btn-ms.s.on{background:var(--grn);color:#04210f;border-color:transparent;box-shadow:0 0 8px var(--grng);}
.btn-arm{width:13px;height:13px;border-radius:50%;border:2px solid currentColor;background:#151528;cursor:pointer;}
.btn-arm.on{background:var(--red);border-color:var(--red);}

/* Clip lane */
.clip-lane{
  flex:1;position:relative;overflow:hidden;cursor:crosshair;
  background:
    linear-gradient(180deg,rgba(255,255,255,.025),rgba(0,0,0,.035)),
    transparent;
  transition:background .12s,box-shadow .12s;
  min-width:var(--timeline-w,1280px);
}
.clip-lane::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.025) 0 1px,transparent 1px 50%,rgba(0,0,0,.08) 100%);
}
.clip-lane.drop-target,.samp-wave.drop-target{
  background:rgba(176,110,243,.1);
  box-shadow:inset 0 0 0 2px var(--acc);
}

/* Canvas inside lane — full size */
.lane-canvas{position:absolute;top:0;left:0;pointer-events:none;}

/* Clip DOM overlays */
.clip-el{
  position:absolute;top:8px;bottom:8px;border-radius:6px;overflow:hidden;
  cursor:grab;touch-action:none;
  transition:filter .1s, box-shadow .1s, transform .1s;
  box-shadow:0 8px 18px rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.14);
  backdrop-filter:blur(4px);
}
.clip-el:hover{filter:brightness(1.12);transform:translateY(-1px);}
.clip-el.dragging{cursor:grabbing;filter:brightness(1.3);z-index:50;box-shadow:0 4px 20px rgba(0,0,0,.5);}
.clip-el.selected{box-shadow:0 0 0 2px rgba(255,255,255,.9),0 0 18px rgba(255,255,255,.28),0 8px 18px rgba(0,0,0,.22);}
.clip-label{
  position:absolute;top:5px;left:8px;right:18px;
  font-size:9px;font-weight:800;opacity:.96;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-shadow:0 1px 1px rgba(0,0,0,.45);
}
.clip-sub{
  position:absolute;left:8px;bottom:5px;font-size:8px;font-weight:700;
  color:rgba(255,255,255,.48);font-variant-numeric:tabular-nums;
}
.clip-resize-r{
  position:absolute;right:0;top:0;bottom:0;width:8px;
  cursor:ew-resize;background:linear-gradient(90deg,transparent,rgba(255,255,255,.18));
  border-radius:0 6px 6px 0;touch-action:none;
}

/* Playhead */
.playhead{
  position:absolute;top:0;bottom:0;width:2px;
  background:#ffffff;z-index:30;pointer-events:none;
  box-shadow:0 0 0 1px rgba(0,0,0,.38),0 0 12px rgba(255,255,255,.72);
}
.playhead::before{
  content:'';position:absolute;top:-9px;left:-6px;width:14px;height:9px;
  background:#fff;border-radius:2px 2px 5px 5px;
  box-shadow:0 2px 8px rgba(255,255,255,.36);
}

/* Add track row */
.add-track-row{
  height:40px;display:flex;align-items:center;padding-left:16px;
  gap:8px;color:var(--txt2);font-size:12px;cursor:pointer;
  border-top:1px solid rgba(255,255,255,.04);transition:background .12s;
}
.add-track-row:hover{background:var(--bg2);color:var(--acc);}

/* Recording indicator on lane */
.recording-lane{animation:reclane .6s infinite alternate;}
@keyframes reclane{from{background:rgba(248,113,113,.04);}to{background:rgba(248,113,113,.12);}}

/* ─── TOOLBAR ─── */
#toolbar{
  height:var(--toolbar-h);flex-shrink:0;
  display:flex;align-items:center;gap:5px;
  padding:0 10px;
  background:var(--bg1);
  box-shadow:0 -2px 8px var(--nsd);
  overflow-x:auto;
}
#toolbar::-webkit-scrollbar{display:none;}

.tool-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 10px;min-width:52px;flex-shrink:0;
  border-radius:var(--rsm);border:none;cursor:pointer;
  background:var(--bg);color:var(--txt2);font-size:9px;font-weight:600;
  box-shadow:2px 2px 6px var(--nsd),-1px -1px 4px var(--nsl);
  transition:all .12s;
}
.tool-btn .ico{font-size:16px;line-height:1;}
.tool-btn.active{color:var(--acc);box-shadow:inset 2px 2px 5px var(--nsd),inset -1px -1px 3px var(--nsl);}
.tool-btn:active{box-shadow:inset 2px 2px 5px var(--nsd),inset -1px -1px 3px var(--nsl);}

/* ─── DRAWER HANDLE ─── */
#drawer-handle{
  height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;background:var(--bg1);
}
.drawer-pill{width:36px;height:4px;border-radius:2px;background:var(--txt3);transition:background .15s;}
#drawer-handle:hover .drawer-pill{background:var(--acc);}

/* ─── BOTTOM DRAWER ─── */
#drawer{
  background:var(--bg1);flex-shrink:0;overflow:hidden;
  transition:height .3s cubic-bezier(.4,0,.2,1);
  box-shadow:0 -4px 16px var(--nsd);
}
#drawer.open{height:var(--drawer-h);}
#drawer.closed{height:0;}

.dtabs{display:flex;padding:8px 10px 0;gap:4px;overflow-x:auto;border-bottom:1px solid rgba(255,255,255,.04);}
.dtabs::-webkit-scrollbar{display:none;}
.dtab{
  padding:5px 12px;border-radius:8px 8px 0 0;border:none;cursor:pointer;
  font-size:10px;font-weight:700;white-space:nowrap;
  background:var(--bg);color:var(--txt2);
  box-shadow:2px 2px 5px var(--nsd),-1px -1px 3px var(--nsl);
  transition:all .12s;
}
.dtab.active{background:var(--acc2);color:#fff;box-shadow:2px 2px 8px var(--nsd),0 0 10px var(--accg);}

.dpanels{height:calc(var(--drawer-h) - 44px);position:relative;}
.dpanel{display:none;height:100%;overflow-y:auto;overflow-x:hidden;padding:10px 12px;}
.dpanel.active{display:block;}
.dpanel::-webkit-scrollbar{width:3px;}
.dpanel::-webkit-scrollbar-thumb{background:var(--txt3);border-radius:2px;}

/* ─── BOTTOM NAV ─── */
#mobile-nav{
  display:none;height:var(--nav);flex-shrink:0;
  background:var(--bg1);padding-bottom:env(safe-area-inset-bottom,0);
  box-shadow:0 -2px 10px var(--nsd);
}
@media(max-width:767px){#mobile-nav{display:flex;}}
.mob-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  border:none;background:none;color:var(--txt3);font-size:9px;font-weight:600;cursor:pointer;
}
.mob-btn.active{color:var(--acc);}
.mob-center-wrap{
  width:44px;height:44px;border-radius:50%;background:var(--acc2);
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 0 16px var(--accg),3px 3px 8px var(--nsd),-2px -2px 5px var(--nsl);
}
.mob-ico{font-size:19px;}

/* ═══════════════════════════════════════════════
   PANEL CONTENT
═══════════════════════════════════════════════ */

/* ─ Drum pads ─ */
.pad-section{}
.pad-grid{display:grid;grid-template-columns:repeat(4,64px);gap:7px;margin-bottom:10px;width:fit-content;}
.pad-btn{
  aspect-ratio:1;max-height:64px;max-width:64px;border-radius:11px;border:none;cursor:pointer;
  font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);color:var(--txt2);
  box-shadow:4px 4px 9px var(--nsd),-2px -2px 6px var(--nsl);
  transition:all .08s;position:relative;overflow:hidden;
}
.pad-btn:active,.pad-btn.hit{
  box-shadow:inset 3px 3px 7px var(--nsd),inset -1px -1px 4px var(--nsl),0 0 10px currentColor;
  transform:scale(.93);
}
/* Sequencer */
.seq-area{margin-top:6px;}
.seq-row{display:flex;align-items:center;gap:4px;margin-bottom:5px;}
.seq-lbl{width:36px;flex-shrink:0;font-size:8px;font-weight:800;text-transform:uppercase;text-align:right;}
.seq-steps{display:flex;gap:2px;flex:1;}
.step{
  flex:1;height:20px;border-radius:3px;border:none;cursor:pointer;
  background:var(--bgd);
  box-shadow:inset 1px 1px 3px var(--nsd),inset -1px -1px 2px var(--nsl);
  transition:all .08s;
}
.step.on{box-shadow:2px 2px 4px var(--nsd),0 0 6px currentColor;}
.step.cur{outline:2px solid #fff;outline-offset:1px;}
.step-gap{width:4px;flex-shrink:0;}

/* ─ Piano roll panel ─ */
.pr-section{display:flex;flex-direction:column;gap:0;height:100%;overflow:hidden;}

/* Mini-map / overview strip */
.pr-minimap-wrap{
  height:28px;flex-shrink:0;border-radius:var(--rsm);overflow:hidden;margin-bottom:6px;
  background:var(--bgd);box-shadow:inset 2px 2px 5px var(--nsd),inset -1px -1px 3px var(--nsl);
  position:relative;cursor:crosshair;
}
#pr-minimap{width:100%;height:100%;display:block;}
.pr-minimap-window{
  position:absolute;top:0;bottom:0;
  background:rgba(176,110,243,.18);border:1px solid rgba(176,110,243,.6);
  cursor:grab;border-radius:2px;pointer-events:all;
}
.pr-minimap-ph{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.7);pointer-events:none;}

/* Toolbar row above the grid */
.pr-toolbar{
  display:flex;align-items:center;gap:6px;flex-shrink:0;margin-bottom:5px;flex-wrap:wrap;
}
.pr-tool-btn{
  padding:4px 9px;border-radius:6px;border:none;cursor:pointer;
  font-size:10px;font-weight:700;transition:all .1s;
  background:var(--bg);color:var(--txt2);
  box-shadow:2px 2px 5px var(--nsd),-1px -1px 3px var(--nsl);
}
.pr-tool-btn.active{background:var(--acc2);color:#fff;box-shadow:2px 2px 6px var(--nsd),0 0 7px var(--accg);}
.pr-tool-btn:active{box-shadow:inset 1px 1px 3px var(--nsd);}
.pr-quant-select{
  padding:4px 7px;border-radius:6px;border:none;cursor:pointer;
  font-size:10px;font-weight:700;
  background:var(--bgd);color:var(--txt);
  box-shadow:inset 2px 2px 4px var(--nsd);outline:none;
}
.pr-zoom-grp{display:flex;gap:3px;margin-left:auto;}

/* Grid container — horizontal + vertical scroll */
.pr-grid-container{
  flex:1;display:flex;overflow:hidden;
  border-radius:var(--rsm);
  box-shadow:inset 2px 2px 8px var(--nsd),inset -1px -1px 5px var(--nsl);
  background:var(--bgd);min-height:0;
}

/* Fixed piano key column */
.pr-keys-col{
  width:42px;flex-shrink:0;overflow:hidden;
  background:var(--bg1);
  border-right:1px solid rgba(255,255,255,.06);
  position:relative;z-index:5;
}
#pr-keys-canvas{display:block;}

/* Scrollable note grid */
.pr-grid-scroll{
  flex:1;overflow:auto;position:relative;
  scrollbar-width:thin;scrollbar-color:var(--txt3) transparent;
}
.pr-grid-scroll::-webkit-scrollbar{width:5px;height:5px;}
.pr-grid-scroll::-webkit-scrollbar-thumb{background:var(--txt3);border-radius:3px;}

/* The inner canvas sits inside the scroll container at its natural size */
#pr-canvas{display:block;cursor:crosshair;}

/* Velocity lane below the grid */
.pr-vel-wrap{
  height:36px;flex-shrink:0;margin-top:4px;
  border-radius:var(--rsm);overflow:hidden;position:relative;
  background:var(--bgd);box-shadow:inset 2px 2px 5px var(--nsd);
  cursor:ns-resize;
}
#pr-vel-canvas{width:100%;height:100%;display:block;}

/* Knobs row */
.pr-knobs{display:flex;gap:10px;justify-content:space-around;margin-top:8px;flex-shrink:0;}
.knob-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;}
.knob{
  width:38px;height:38px;border-radius:50%;position:relative;cursor:pointer;
  background:var(--bg);
  box-shadow:4px 4px 9px var(--nsd),-2px -2px 6px var(--nsl);
}
.knob-dot{position:absolute;top:5px;left:50%;transform:translateX(-50%);width:3px;height:9px;background:var(--acc);border-radius:2px;transform-origin:50% calc(30px/2 - 5px);}
.knob-lbl{font-size:9px;color:var(--txt2);}
.knob-val{font-size:9px;color:var(--txt3);}

/* ══ MPC PAD GRID ══ */
.mpc-bank-row{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap;}
.mpc-bank-btn{
  padding:4px 9px;border-radius:6px;border:none;cursor:pointer;font-size:10px;font-weight:700;
  background:var(--bg);color:var(--txt2);
  box-shadow:2px 2px 5px var(--nsd),-1px -1px 3px var(--nsl);transition:all .1s;
}
.mpc-bank-btn.active{background:var(--acc2);color:#fff;box-shadow:2px 2px 6px var(--nsd),0 0 7px var(--accg);}
.mpc-feat-row{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:wrap;}
.mpc-feat-btn{
  padding:3px 8px;border-radius:6px;border:none;cursor:pointer;font-size:10px;font-weight:600;
  background:var(--bg);color:var(--txt2);
  box-shadow:2px 2px 4px var(--nsd),-1px -1px 3px var(--nsl);transition:all .1s;
}
.mpc-feat-btn.active{background:var(--red);color:#fff;}
.mpc-pad-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:4px;
}
.mpc-pad{
  border-radius:9px;height:52px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  cursor:pointer;touch-action:manipulation;user-select:none;
  border:1px solid rgba(255,255,255,.08);
  position:relative;overflow:hidden;
  transition:transform .07s,opacity .08s;
  box-shadow:3px 3px 8px var(--nsd),-2px -2px 5px var(--nsl);
}
.mpc-pad:active,.mpc-pad.hit{transform:scale(.88);opacity:.6;box-shadow:inset 2px 2px 5px var(--nsd);}
.mpc-pad.empty{opacity:.3;border-style:dashed;}
.mpc-pad-num{position:absolute;top:3px;left:5px;font-size:8px;opacity:.45;font-weight:700;}
.mpc-pad-lbl{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#fff;}
.mpc-pad-vel{position:absolute;bottom:2px;right:4px;font-size:7px;opacity:.4;}
.mpc-swing-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;font-size:10px;color:var(--txt2);}
.mpc-swing-row input[type=range]{flex:1;height:3px;-webkit-appearance:none;appearance:none;
  background:var(--bgd);border-radius:2px;outline:none;cursor:pointer;}
.mpc-swing-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--acc);box-shadow:0 0 4px var(--accg);}

/* ══ NOTE POPOVER ══ */
#note-popover{
  position:fixed;z-index:9200;
  background:var(--bg1);border:1px solid var(--acc2);border-radius:var(--r);
  padding:11px 13px;min-width:190px;
  box-shadow:0 8px 32px rgba(0,0,0,.75),0 0 0 1px rgba(176,110,243,.18);
  display:none;flex-direction:column;gap:7px;font-size:12px;color:var(--txt);
}
#note-popover.show{display:flex;}
.np-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.np-notename{font-size:16px;font-weight:700;
  background:linear-gradient(135deg,var(--acc),#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.np-midinum{font-size:10px;color:var(--txt2);}
.np-close{background:none;border:none;color:var(--txt2);font-size:14px;cursor:pointer;padding:0 2px;line-height:1;}
.np-row{display:flex;align-items:center;gap:7px;}
.np-lbl{width:52px;flex-shrink:0;font-size:10px;color:var(--txt2);}
.np-val{
  flex:1;background:var(--bgd);border:1px solid var(--txt3);border-radius:6px;
  padding:3px 7px;color:var(--txt);font-size:12px;outline:none;
  box-shadow:inset 1px 1px 3px var(--nsd);}
.np-val:focus{border-color:var(--acc);}
.np-btns{display:flex;gap:5px;margin-top:2px;}
.np-btn{
  flex:1;padding:5px 0;border-radius:6px;border:none;cursor:pointer;
  font-size:10px;font-weight:700;
  background:var(--bg2);color:var(--txt2);
  box-shadow:2px 2px 5px var(--nsd),-1px -1px 3px var(--nsl);transition:all .1s;
}
.np-btn:active{box-shadow:inset 1px 1px 3px var(--nsd);}
.np-btn.prim{background:var(--acc2);color:#fff;}
.np-btn.danger{color:var(--red);}

/* ══ INLINE EDIT POPOVER ══ */
#inline-edit-pop{
  position:fixed;z-index:9100;
  background:var(--bg1);border:1px solid var(--acc2);border-radius:var(--r);
  padding:13px 15px;min-width:230px;
  box-shadow:0 8px 32px rgba(0,0,0,.75);
  display:flex;flex-direction:column;gap:9px;
  top:50%;left:50%;transform:translate(-50%,-50%);
}
.iep-lbl{font-size:11px;color:var(--txt2);}
.iep-inp{
  background:var(--bgd);border:1px solid var(--txt3);border-radius:6px;
  padding:6px 9px;color:var(--txt);font-size:14px;outline:none;width:100%;
  box-shadow:inset 1px 1px 3px var(--nsd);}
.iep-inp:focus{border-color:var(--acc);}
.iep-btns{display:flex;gap:7px;}
.iep-btn{
  flex:1;padding:7px 0;border-radius:6px;border:none;cursor:pointer;
  font-size:12px;font-weight:700;background:var(--bg2);color:var(--txt2);
  box-shadow:2px 2px 5px var(--nsd),-1px -1px 3px var(--nsl);}
.iep-btn.prim{background:var(--acc2);color:#fff;}

/* ══ PR PLAYHEAD SYNC ══ */
.pr-note-flash{
  position:absolute;left:0;right:0;background:rgba(176,110,243,.35);
  pointer-events:none;animation:prfl .35s ease forwards;}
@keyframes prfl{from{opacity:.85;}to{opacity:0;}}
.clip-midi-hint{
  position:absolute;bottom:3px;right:5px;font-size:9px;
  color:rgba(255,255,255,.35);pointer-events:none;}

/* ══ MIDI DEVICE PANEL ══ */
.midi-device-row{
  display:flex;align-items:center;gap:8px;padding:6px 0;
  border-bottom:1px solid var(--txt3);font-size:12px;}
.midi-device-row:last-child{border-bottom:none;}
.midi-dev-led{width:7px;height:7px;border-radius:50%;flex-shrink:0;}

/* ─ Sampler / Chopper ─ */
.sampler-section{}
.samp-filename{font-size:11px;font-weight:600;color:var(--txt);margin-bottom:6px;}
.samp-wave{height:64px;border-radius:var(--rsm);overflow:hidden;position:relative;margin-bottom:8px;
  background:var(--bgd);box-shadow:inset 2px 2px 6px var(--nsd);}
#samp-canvas{width:100%;height:100%;display:block;}
.samp-modes{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
.samp-mode{padding:5px 11px;border-radius:var(--rsm);border:none;font-size:10px;font-weight:700;cursor:pointer;background:var(--bg);color:var(--txt2);box-shadow:2px 2px 5px var(--nsd),-1px -1px 3px var(--nsl);transition:all .12s;}
.samp-mode.active{background:var(--acc2);color:#fff;box-shadow:2px 2px 6px var(--nsd),0 0 8px var(--accg);}
.samp-slices{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.samp-slices label{font-size:10px;color:var(--txt2);}
.slice-count{font-size:12px;font-weight:700;color:var(--acc);}
.chop-btns{display:flex;gap:6px;}
.chop-btn{flex:1;padding:8px;border-radius:var(--rsm);border:none;cursor:pointer;font-size:11px;font-weight:700;transition:all .12s;}
.chop-btn.prim{background:var(--acc2);color:#fff;box-shadow:2px 2px 7px var(--nsd),0 0 8px var(--accg);}
.chop-btn.sec{background:var(--bg);color:var(--txt2);box-shadow:2px 2px 5px var(--nsd),-1px -1px 3px var(--nsl);}
.chop-btn:active{transform:scale(.95);}
.slice-markers{display:flex;gap:3px;margin-top:8px;flex-wrap:wrap;}
.slice-marker{
  width:32px;height:32px;border-radius:6px;border:none;cursor:pointer;
  background:var(--bg);font-size:9px;font-weight:800;color:var(--acc2);
  box-shadow:2px 2px 5px var(--nsd),-1px -1px 3px var(--nsl);transition:all .08s;
}
.slice-marker:active{box-shadow:inset 2px 2px 4px var(--nsd),0 0 8px var(--acc);}

/* ─ Effects ─ */
.fx-slot{
  display:flex;align-items:center;gap:9px;padding:9px 11px;margin-bottom:7px;
  border-radius:var(--r);background:var(--bg);
  box-shadow:3px 3px 8px var(--nsd),-2px -2px 5px var(--nsl);
}
.fx-name{flex:0 0 auto;min-width:64px;font-size:12px;font-weight:600;color:var(--txt);}
.fx-wet-slider{
  flex:1 1 auto;min-width:0;height:4px;-webkit-appearance:none;appearance:none;background:var(--bgd);
  border-radius:3px;box-shadow:inset 1px 1px 3px var(--nsd);outline:none;cursor:pointer;
}
.fx-wet-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--acc);
  box-shadow:0 0 5px var(--accg),2px 2px 4px var(--nsd);cursor:grab;
}
.fx-wet-slider::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;background:var(--acc);border:none;
  box-shadow:0 0 5px var(--accg);cursor:grab;
}
.fx-val{flex:0 0 auto;font-size:10px;color:var(--txt2);min-width:30px;text-align:right;}
.fx-toggle{width:30px;height:16px;border-radius:8px;border:none;cursor:pointer;position:relative;transition:background .2s;background:var(--bgd);box-shadow:inset 1px 1px 3px var(--nsd);flex-shrink:0;}
.fx-toggle::after{content:'';position:absolute;top:2px;width:12px;height:12px;border-radius:50%;background:var(--txt3);transition:all .2s;right:14px;}
.fx-toggle.on::after{right:2px;background:var(--acc);box-shadow:0 0 5px var(--accg);}
.fx-remove-btn{
  width:22px;height:22px;flex-shrink:0;border:none;border-radius:50%;cursor:pointer;
  background:var(--bgd);color:var(--txt3);font-size:10px;
  box-shadow:inset 1px 1px 3px var(--nsd);transition:all .12s;
}
.fx-remove-btn:hover{color:var(--red);}
.fx-add-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.fx-add-chip{
  padding:7px 12px;border-radius:var(--r);border:1px dashed var(--txt3);background:none;
  color:var(--txt2);font-size:11px;cursor:pointer;transition:all .15s;
}
.fx-add-chip:hover{border-color:var(--acc);color:var(--acc);}

/* ─ Mixer ─ */
.mix-strips{display:flex;gap:7px;overflow-x:auto;padding:4px 0;}
.mix-strips::-webkit-scrollbar{height:3px;}
.mix-strips::-webkit-scrollbar-thumb{background:var(--txt3);border-radius:2px;}
.mix-ch{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:8px 7px;border-radius:var(--r);flex-shrink:0;min-width:56px;
  background:var(--bg);
  box-shadow:4px 4px 10px var(--nsd),-2px -2px 6px var(--nsl);
}
.mix-ico{font-size:14px;}
.mix-fader-t{width:8px;height:80px;border-radius:4px;position:relative;cursor:pointer;background:var(--bgd);box-shadow:inset 2px 2px 5px var(--nsd);}
.mix-thumb{position:absolute;left:-8px;width:24px;height:13px;border-radius:4px;cursor:grab;background:var(--bg1);box-shadow:3px 3px 5px var(--nsd),-1px -1px 3px var(--nsl);}
.mix-meter{width:8px;height:80px;border-radius:4px;overflow:hidden;background:var(--bgd);box-shadow:inset 2px 2px 5px var(--nsd);position:relative;}
.mix-fill{position:absolute;bottom:0;left:0;right:0;border-radius:4px;transition:height .06s;}
.mix-lbl{font-size:8px;font-weight:700;color:var(--txt2);letter-spacing:.3px;}
.mix-master{background:var(--bg2);min-width:66px;}

/* ─ Automation ─ */
.auto-toolbar{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
.auto-btn{padding:5px 10px;border-radius:var(--rsm);border:none;cursor:pointer;font-size:10px;font-weight:700;background:var(--bg);color:var(--txt2);box-shadow:2px 2px 5px var(--nsd),-1px -1px 3px var(--nsl);transition:all .12s;}
.auto-btn.active{background:var(--acc2);color:#fff;box-shadow:2px 2px 6px var(--nsd),0 0 8px var(--accg);}
.auto-param{padding:4px 8px;border-radius:var(--rsm);border:none;background:var(--bgd);color:var(--txt);font-size:10px;box-shadow:inset 2px 2px 5px var(--nsd);}
.auto-wrap{border-radius:var(--r);overflow:hidden;cursor:crosshair;position:relative;
  background:var(--bgd);box-shadow:inset 2px 2px 8px var(--nsd),inset -1px -1px 5px var(--nsl);}
#auto-canvas{width:100%;display:block;}

/* ─ Recording panel ─ */
.rec-section{display:flex;flex-direction:column;gap:12px;}
.rec-vu{height:48px;border-radius:var(--r);position:relative;overflow:hidden;background:var(--bgd);box-shadow:inset 2px 2px 6px var(--nsd);}
#rec-canvas{width:100%;height:100%;display:block;}
.rec-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.rec-opt{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:var(--rsm);background:var(--bg);box-shadow:2px 2px 5px var(--nsd),-1px -1px 3px var(--nsl);}
.rec-opt-lbl{font-size:10px;color:var(--txt2);font-weight:600;}
.toggle-pill{width:32px;height:16px;border-radius:8px;border:none;cursor:pointer;position:relative;transition:background .2s;background:var(--bgd);box-shadow:inset 1px 1px 3px var(--nsd);}
.toggle-pill::after{content:'';position:absolute;top:2px;width:12px;height:12px;border-radius:50%;background:var(--txt3);transition:all .2s;right:14px;}
.toggle-pill.on::after{right:2px;background:var(--acc);box-shadow:0 0 5px var(--accg);}
.rec-big-btn{
  padding:14px;border-radius:var(--r);border:none;cursor:pointer;
  font-size:14px;font-weight:800;letter-spacing:.5px;
  background:var(--red);color:#fff;
  box-shadow:4px 4px 12px var(--nsd),0 0 20px var(--redg);
  transition:all .12s;animation:recpulse 1.4s infinite;
}
.rec-big-btn:active{transform:scale(.96);}

/* ─ Context menu ─ */
#ctx-menu{
  position:fixed;z-index:200;border-radius:var(--r);overflow:hidden;
  background:var(--bg2);
  box-shadow:6px 6px 20px var(--nsd),-2px -2px 8px var(--nsl);
  display:none;min-width:140px;
}
.ctx-item{padding:10px 14px;font-size:12px;cursor:pointer;color:var(--txt);transition:background .1s;}
.ctx-item:hover{background:var(--bg3);}
.ctx-item.danger{color:var(--red);}
.ctx-sep{height:1px;background:rgba(255,255,255,.06);margin:2px 0;}

/* ─ Toast ─ */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--bg2);border-radius:20px;padding:7px 16px;
  font-size:12px;color:var(--txt);opacity:0;pointer-events:none;
  transition:opacity .2s;z-index:300;white-space:nowrap;
  box-shadow:4px 4px 12px var(--nsd),-2px -2px 8px var(--nsl);
}
#toast.show{opacity:1;}

/* ─ Selection box ─ */
#sel-box{
  position:absolute;border:1.5px solid var(--acc);background:rgba(176,110,243,.1);
  pointer-events:none;z-index:25;display:none;border-radius:3px;
}

/* ─ Responsive grid for panels ─ */
@media(min-width:768px){
  #drawer{--drawer-h:340px;}
  .mix-strips{gap:10px;}
  .mix-ch{min-width:66px;padding:10px 9px;}
  .mix-fader-t,.mix-meter{height:100px;}
  .rec-opts{grid-template-columns:repeat(4,1fr);}
}
@media(min-width:1024px){
  #drawer{--drawer-h:360px;}
  .dpanel{padding:12px 18px;}
}

/* ─ Responsive track header width ─ */
@media(max-width:480px){
  :root{--hdr-w:112px;--track-h:64px;}
  .pad-grid{grid-template-columns:repeat(4,minmax(0,1fr));width:100%;max-width:320px;}
  .pad-btn{max-width:none;}
  .track-icon{display:none;}
  .track-hdr{grid-template-columns:minmax(0,1fr) auto;padding-left:9px;}
  .track-kind{display:none;}
}
@media(min-width:1024px){
  :root{--hdr-w:168px;}
}

/* ─ Scrollbar hide on touch ─ */
@media(pointer:coarse){
  #tracks-scroll::-webkit-scrollbar{display:none;}
}
</style>
</head>
<body>
<div id="app">

<!-- TOP BAR -->
<div id="topbar">
  <span class="brand">Neusic</span>
  <div class="tb-sep"></div>

  <div class="tb-btn-wrap">
    <button class="tb-btn" id="btn-undo" onclick="undo()" title="Undo (Ctrl+Z)">↩</button>
    <div class="undo-count" id="undo-badge" style="display:none">0</div>
  </div>
  <div class="tb-btn-wrap">
    <button class="tb-btn" id="btn-redo" onclick="redo()" title="Redo (Ctrl+Y)">↪</button>
    <div class="undo-count" id="redo-badge" style="display:none">0</div>
