/* ── DRUM MACHINE ── */
function buildDrums(el){
  const padHTML=PADS.map(p=>`
    <button class="pad-btn" id="pad-${p.id}" style="color:${p.col};background:${p.bg};"
      onmousedown="hitPad(${p.id},'${p.n}')" ontouchstart="hitPad(${p.id},'${p.n}')">${p.n}</button>`).join('');
  const seqHTML=PADS.slice(0,4).map(p=>{
    const steps=S.seqSteps[p.id]||Array(16).fill(0);
    let stHTML='';
    steps.forEach((on,i)=>{
      if(i===4||i===8||i===12)stHTML+=`<div class="step-gap"></div>`;
      stHTML+=`<button class="step${on?' on':''}" style="${on?`background:${p.col}44;color:${p.col};box-shadow:2px 2px 4px var(--nsd),0 0 5px ${p.col}`:''}"
        onclick="toggleStep(${p.id},${i},this,'${p.col}')"></button>`;
    });
    return `<div class="seq-row"><div class="seq-lbl" style="color:${p.col}">${p.n}</div><div class="seq-steps">${stHTML}</div></div>`;
  }).join('');
  el.innerHTML=`<div class="pad-section">
    <div class="pad-grid">${padHTML}</div>
    <div class="seq-area">${seqHTML}</div>
  </div>`;
}

function hitPad(id,name){
  const btn=document.getElementById('pad-'+id);
  if(btn){btn.classList.add('hit');setTimeout(()=>btn.classList.remove('hit'),110);}
  Audio_.synthDrum(name);
}
function toggleStep(id,i,btn,col){
  const steps=S.seqSteps[id]||(S.seqSteps[id]=Array(16).fill(0));
  steps[i]=steps[i]?0:1;const on=steps[i];
  btn.classList.toggle('on',!!on);
  btn.style.background=on?col+'44':'';btn.style.color=on?col:'';
  btn.style.boxShadow=on?`2px 2px 4px var(--nsd),0 0 5px ${col}`:'';
}
// NOTE: the step sequencer is no longer driven by its own setInterval timer —
// see scheduleSeqSteps()/flashSeqStep() in the PLAYBACK section above, which
// schedule each 16th-note hit with a precise look-ahead "when" instead of
// firing live from a timer callback (the classic source of audible drum jitter).


/* ══════════════════════════════════════════════════════
   PIANO ROLL — full 88-key scrollable grid
   ══════════════════════════════════════════════════════
   Layout:
     pr-minimap-wrap  — song-position mini-map (top)
     pr-toolbar       — tool buttons + quantise selector
     pr-grid-container
       pr-keys-col    — 88 piano keys, synced vertical scroll
       pr-grid-scroll — 2-D scrollable note grid canvas
     pr-vel-wrap      — velocity lane (bottom strip)
     pr-knobs         — pitch/pan/gain/tune knobs
   ═══════════════════════════════════════════════════════ */

const PR={
  NOTE_H:12,        // px per semitone row
  TOTAL_NOTES:88,   // A0 (MIDI 21) → C8 (MIDI 108)
  MIDI_TOP:108,     // highest note displayed at top
  PPB:60,           // pixels per beat (horizontal zoom)
  BARS:32,          // total bars in the roll
  BEATS_PER_BAR:4,
  quantise:0.25,    // beats (1/16 note default)
  activeTool:'draw',// draw | select | erase
  notes:[],         // [{midi, beat, len, vel}]
  selNotes:new Set(),
  drag:null,        // active drag state
  prScrollSync:0,   // last vertical scroll position
};

// Demo notes seeded when the panel opens (one octave of a Cm scale over 4 bars)
const PR_DEMO_NOTES=[
  {midi:60,beat:0,   len:1,  vel:100},
  {midi:62,beat:1,   len:0.5,vel:90 },
  {midi:63,beat:1.5, len:0.5,vel:88 },
  {midi:65,beat:2,   len:1,  vel:95 },
  {midi:67,beat:3,   len:1,  vel:92 },
  {midi:67,beat:4,   len:2,  vel:98 },
  {midi:65,beat:6,   len:0.5,vel:85 },
  {midi:63,beat:6.5, len:0.5,vel:82 },
  {midi:62,beat:7,   len:1,  vel:88 },
  {midi:60,beat:8,   len:2,  vel:100},
  {midi:55,beat:0,   len:4,  vel:70 },
  {midi:55,beat:4,   len:4,  vel:68 },
  {midi:58,beat:0,   len:8,  vel:60 },
  {midi:72,beat:2,   len:0.25,vel:95},
  {midi:74,beat:2.5, len:0.25,vel:88},
  {midi:75,beat:3,   len:0.25,vel:92},
  {midi:77,beat:3.5, len:0.25,vel:90},
];

function buildPiano(el){
  if(PR.notes.length===0)PR.notes=PR_DEMO_NOTES.map(n=>({...n}));
  const t=S.tracks[S.activeTrack];
  const col=t?t.color:'#a78bfa';

  el.innerHTML=`<div class="pr-section">
    <div class="pr-minimap-wrap" id="pr-minimap-wrap">
      <canvas id="pr-minimap"></canvas>

      <div class="pr-minimap-ph" id="pr-mm-ph"></div>
    </div>

    <div class="pr-toolbar">
      <button class="pr-tool-btn${PR.activeTool==='draw'?' active':''}"   id="prt-draw"   onclick="setPRTool('draw')">✏️ Draw</button>
      <button class="pr-tool-btn${PR.activeTool==='select'?' active':''}" id="prt-select" onclick="setPRTool('select')">⬚ Select</button>
      <button class="pr-tool-btn${PR.activeTool==='erase'?' active':''}"  id="prt-erase"  onclick="setPRTool('erase')">⌫ Erase</button>
      <select class="pr-quant-select" id="pr-quant" onchange="setPRQuant(this.value)">
        <option value="2">1/2</option>
        <option value="1">1/4</option>

        <option value="0.25" selected>1/16</option>
        <option value="0.125">1/32</option>
        <option value="0">Free</option>
      </select>
      <div class="pr-zoom-grp">
        <button class="pr-tool-btn" onclick="prZoom(1.25)" title="Zoom in">＋</button>
        <button class="pr-tool-btn" onclick="prZoom(0.8)"  title="Zoom out">－</button>
        <button class="pr-tool-btn" onclick="prZoomFit()"  title="Fit">⊡</button>
      </div>
    </div>

    <div class="pr-grid-container" id="pr-grid-container">
      <div class="pr-keys-col" id="pr-keys-col">
        <canvas id="pr-keys-canvas"></canvas>
      </div>
      <div class="pr-grid-scroll" id="pr-grid-scroll">
        <canvas id="pr-canvas"></canvas>
      </div>
    </div>

    <div class="pr-vel-wrap">
      <canvas id="pr-vel-canvas"></canvas>
    </div>

    <div class="pr-knobs">
      ${[['Pitch','0 st',160],['Pan','C',180],['Gain','0 dB',175],['Tune','0%',180]].map(([l,v,d])=>`
      <div class="knob-wrap">
        <div class="knob"><div class="knob-dot" style="transform:translateX(-50%) rotate(${d}deg)"></div></div>
        <div class="knob-lbl">${l}</div><div class="knob-val">${v}</div>
      </div>`).join('')}
    </div>
  </div>`;

  requestAnimationFrame(()=>prInit(col));

/* ── Initialise dimensions & bind events ── */
function prInit(col){
  const scroll=document.getElementById('pr-grid-scroll');
  const keysCol=document.getElementById('pr-keys-col');
  if(!scroll)return;

  // Size the inner canvas to the full virtual size
  prResizeCanvases();

  // Sync vertical scroll: keys column mirrors grid scroll
  scroll.addEventListener('scroll',()=>{
    keysCol.scrollTop=scroll.scrollTop;
    PR.prScrollSync=scroll.scrollTop;
    prDrawKeys(col);
    prDrawMinimap(col);
    prUpdateMinimapWindow();
  });

  // Scroll to around middle C (MIDI 60) on open
  const midCRow=(PR.MIDI_TOP-60)*PR.NOTE_H;
  scroll.scrollTop=Math.max(0,midCRow-scroll.clientHeight/2);
  scroll.scrollLeft=0;

  prDrawKeys(col);
  prDrawGrid(col);
  prDrawVelocity(col);
  prDrawMinimap(col);
  prUpdateMinimapWindow();
  prBindGridEvents(col);
  prBindMinimapEvents();
}

/* ── Canvas sizing ── */
function prResizeCanvases(){
  const container=document.getElementById('pr-grid-container');
  const scroll=document.getElementById('pr-grid-scroll');
  const keysCol=document.getElementById('pr-keys-col');
  const kc=document.getElementById('pr-keys-canvas');
  const gc=document.getElementById('pr-canvas');
  const mm=document.getElementById('pr-minimap');
  const vc=document.getElementById('pr-vel-canvas');
  if(!container||!scroll||!kc||!gc)return;

  const totalH=PR.TOTAL_NOTES*PR.NOTE_H;
  const totalW=PR.BARS*PR.BEATS_PER_BAR*PR.PPB;
  const visH=container.clientHeight||200;
  const keysW=42;

  // Keys column canvas — as tall as the full note range
  keysCol.style.height=visH+'px';
  keysCol.style.overflowY='hidden'; // keys scroll driven by JS not CSS
  kc.width=keysW;kc.height=totalH;
  kc.style.width=keysW+'px';kc.style.height=totalH+'px';

  // Grid canvas — full virtual size, scroll container clips it
  gc.width=totalW;gc.height=totalH;
  gc.style.width=totalW+'px';gc.style.height=totalH+'px';
  scroll.style.height=visH+'px';

  // Minimap
  if(mm){const mmw=mm.parentElement.offsetWidth||300;mm.width=mmw;mm.height=28;}

  // Velocity lane
  if(vc){vc.width=vc.parentElement.offsetWidth||300;vc.height=36;}
}

/* ── Draw the fixed piano key column ── */
function prDrawKeys(col){
  const c=document.getElementById('pr-keys-canvas');if(!c)return;
  const scroll=document.getElementById('pr-grid-scroll');
  const scrollTop=scroll?scroll.scrollTop:0;
  const ctx=c.getContext('2d'),w=c.width;
  const blackPCs=[1,3,6,8,10]; // pitch classes that are black keys

  ctx.fillStyle='#0f0f1e';ctx.fillRect(0,0,w,c.height);

  for(let i=0;i<PR.TOTAL_NOTES;i++){
    const midi=PR.MIDI_TOP-i;
    const pc=(midi)%12;
    const y=i*PR.NOTE_H;
    const isBlack=blackPCs.includes(pc);
    const isC=pc===0;

    // Key background
    ctx.fillStyle=isBlack?'#1a1a2e':isC?'#2a2a42':'#22223a';
    ctx.fillRect(0,y,w,PR.NOTE_H);

    // Subtle divider
    ctx.strokeStyle=isC?'rgba(176,110,243,.35)':'rgba(255,255,255,.05)';
    ctx.lineWidth=isC?1:0.5;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();

    // Black key visual accent
    if(isBlack){
      ctx.fillStyle='rgba(0,0,0,.45)';
      ctx.fillRect(0,y,w*0.72,PR.NOTE_H);
    }

    // Note name labels — C notes and every 12th
    if(isC){
      const oct=Math.floor(midi/12)-1;
      ctx.fillStyle='rgba(176,110,243,.8)';
      ctx.font=`700 8px system-ui`;
      ctx.textAlign='right';
      ctx.fillText(`C${oct}`,w-3,y+PR.NOTE_H-2);
    }
  }

  // Scroll the keys canvas to match grid scroll
  const kc=document.getElementById('pr-keys-col');
  if(kc)kc.style.transform=`translateY(-${scrollTop}px)`;
}

/* ── Draw the note grid ── */
function prDrawGrid(col){
  const c=document.getElementById('pr-canvas');if(!c)return;
  const ctx=c.getContext('2d'),w=c.width,h=c.height;
  const blackPCs=[1,3,6,8,10];
  const beatsTotal=PR.BARS*PR.BEATS_PER_BAR;

  ctx.fillStyle='#14142a';ctx.fillRect(0,0,w,h);

  // Horizontal rows — one per semitone
  for(let i=0;i<PR.TOTAL_NOTES;i++){
    const midi=PR.MIDI_TOP-i;
    const pc=midi%12;
    const y=i*PR.NOTE_H;
    if(blackPCs.includes(pc)){ctx.fillStyle='rgba(0,0,0,.22)';ctx.fillRect(0,y,w,PR.NOTE_H);}
    // Octave C lines
    if(pc===0){ctx.strokeStyle='rgba(176,110,243,.2)';ctx.lineWidth=1;}
    else{ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=0.5;}
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();
  }

  // Vertical beat/bar lines
  for(let b=0;b<=beatsTotal;b++){
    const x=b*PR.PPB;
    if(b%PR.BEATS_PER_BAR===0){
      ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1;
      // Bar number label
      ctx.fillStyle='rgba(255,255,255,.25)';
      ctx.font='700 9px system-ui';ctx.textAlign='left';
      ctx.fillText(`${b/PR.BEATS_PER_BAR+1}`,x+3,10);
    } else {
      ctx.strokeStyle='rgba(255,255,255,.05)';ctx.lineWidth=0.5;
    }
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();
  }

  // Notes
  PR.notes.forEach((n,idx)=>{
    const row=PR.MIDI_TOP-n.midi;
    if(row<0||row>=PR.TOTAL_NOTES)return;
    const x=n.beat*PR.PPB;
    const y=row*PR.NOTE_H;
    const nw=Math.max(4,n.len*PR.PPB-1);
    const nh=PR.NOTE_H-1;
    const selected=PR.selNotes.has(idx);
    const alpha=selected?'ff':'cc';

    // Note body
    ctx.fillStyle=col+alpha;
    ctx.beginPath();ctx.roundRect(x,y+0.5,nw,nh-1,2);ctx.fill();

    // Highlight sheen on top edge
    ctx.fillStyle='rgba(255,255,255,.22)';
    ctx.beginPath();ctx.roundRect(x,y+0.5,nw,2,1);ctx.fill();

    // Selected outline
    if(selected){
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(x,y+0.5,nw,nh-1,2);ctx.stroke();
    }

    // Resize handle on right edge (last 4px)
    ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.fillRect(x+nw-3,y+2,2,nh-4);
  });

  // Transport playhead
  const phX=S.pct*beatsTotal*PR.PPB;
  ctx.strokeStyle='rgba(255,255,255,.8)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(phX,0);ctx.lineTo(phX,h);ctx.stroke();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.moveTo(phX-4,0);ctx.lineTo(phX+4,0);ctx.lineTo(phX,6);ctx.fill();
}

/* ── Draw velocity lane ── */
function prDrawVelocity(col){
  const c=document.getElementById('pr-vel-canvas');if(!c)return;
  const ctx=c.getContext('2d'),w=c.width,h=c.height;
  const beatsTotal=PR.BARS*PR.BEATS_PER_BAR;
  ctx.fillStyle='#0f0f1e';ctx.fillRect(0,0,w,h);
  PR.notes.forEach(n=>{
    const x=(n.beat/beatsTotal)*w;
    const bw=Math.max(2,(n.len/beatsTotal)*w-1);
    const bh=((n.vel||80)/127)*(h-4);
    ctx.fillStyle=col+'99';
    ctx.beginPath();ctx.roundRect(x,h-bh-1,bw,bh,2);ctx.fill();
  });
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(w,0);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,.2)';ctx.font='8px system-ui';ctx.textAlign='left';
  ctx.fillText('vel',2,9);
}

/* ── Mini-map ── */
function prDrawMinimap(col){
  const c=document.getElementById('pr-minimap');if(!c)return;
  const ctx=c.getContext('2d'),w=c.width,h=c.height;
  const beatsTotal=PR.BARS*PR.BEATS_PER_BAR;
  const noteRange=PR.TOTAL_NOTES;
  ctx.fillStyle='#0f0f1e';ctx.fillRect(0,0,w,h);
  // Beat grid faint lines
  for(let b=0;b<=PR.BARS;b++){
    const x=(b*PR.BEATS_PER_BAR/beatsTotal)*w;
    ctx.strokeStyle=b%4===0?'rgba(255,255,255,.1)':'rgba(255,255,255,.04)';
    ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();
  }
  // Notes as tiny rects
  PR.notes.forEach(n=>{
    const row=PR.MIDI_TOP-n.midi;if(row<0||row>=noteRange)return;
    const x=(n.beat/beatsTotal)*w;
    const y=(row/noteRange)*h;
    const nw=Math.max(1,(n.len/beatsTotal)*w);
    const nh=Math.max(1,h/noteRange*2);
    ctx.fillStyle=col+'cc';
    ctx.fillRect(x,y,nw,nh);
  });
}

function prUpdateMinimapWindow(){
  const scroll=document.getElementById('pr-grid-scroll');
  const win=document.getElementById('pr-mm-win');
  const ph=document.getElementById('pr-mm-ph');
  const mm=document.getElementById('pr-minimap');
  if(!scroll||!win||!mm)return;

  const totalW=PR.BARS*PR.BEATS_PER_BAR*PR.PPB;
  const totalH=PR.TOTAL_NOTES*PR.NOTE_H;
  const visW=scroll.clientWidth;const visH=scroll.clientHeight;
  const mmW=mm.offsetWidth||300;const mmH=mm.offsetHeight||28;

  const left=(scroll.scrollLeft/totalW)*mmW;
  const winW=Math.max(8,(visW/totalW)*mmW);
  win.style.left=left+'px';win.style.width=winW+'px';

  // Playhead in minimap
  if(ph){
    const beatsTotal=PR.BARS*PR.BEATS_PER_BAR;
    ph.style.left=((S.pct*beatsTotal*PR.PPB)/totalW*mmW)+'px';
  }
}

/* ── Minimap drag to seek horizontal scroll ── */
function prBindMinimapEvents(){
  const mm=document.getElementById('pr-minimap-wrap');
  const win=document.getElementById('pr-mm-win');
  const scroll=document.getElementById('pr-grid-scroll');
  if(!mm||!scroll)return;
  let dragging=false,startX=0,startScrollL=0;
  const seek=cx=>{
    const rect=mm.getBoundingClientRect();
    const frac=Math.max(0,Math.min(1,(cx-rect.left)/rect.width));
    const totalW=PR.BARS*PR.BEATS_PER_BAR*PR.PPB;
    scroll.scrollLeft=frac*totalW;
    prUpdateMinimapWindow();
  };
  mm.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;startScrollL=scroll.scrollLeft;seek(e.clientX);});
  window.addEventListener('mousemove',e=>{if(!dragging)return;seek(e.clientX);});
  window.addEventListener('mouseup',()=>{dragging=false;});
  mm.addEventListener('touchstart',e=>{dragging=true;seek(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchmove',e=>{if(!dragging)return;seek(e.touches[0].clientX);},{passive:true});
  window.addEventListener('touchend',()=>{dragging=false;});
}

/* ── Grid interaction: draw / erase / select ── */
function prBindGridEvents(col){
  const c=document.getElementById('pr-canvas');if(!c)return;
  let dragState=null;

  const posFromEvent=e=>{
    const rect=c.getBoundingClientRect();
    const scroll=document.getElementById('pr-grid-scroll');
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left+scroll.scrollLeft;
    const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top+scroll.scrollTop;
    const midi=PR.MIDI_TOP-Math.floor(cy/PR.NOTE_H);
    const rawBeat=cx/PR.PPB;
    const beat=PR.quantise>0?Math.round(rawBeat/PR.quantise)*PR.quantise:rawBeat;
    return {midi,beat:Math.max(0,beat),x:cx,y:cy};
  };

  const noteAt=(x,y)=>{
    const scroll=document.getElementById('pr-grid-scroll');
    const sy=scroll?scroll.scrollTop:0;const sx=scroll?scroll.scrollLeft:0;
    const midi=PR.MIDI_TOP-Math.floor(y/PR.NOTE_H);
    const beat=x/PR.PPB;
    return PR.notes.findIndex(n=>{
      if(n.midi!==midi)return false;
      return beat>=n.beat&&beat<=n.beat+n.len;
    });
  };

  const redraw=()=>{ prDrawGrid(col);prDrawVelocity(col);prDrawMinimap(col);prUpdateMinimapWindow(); };

  c.addEventListener('mousedown',e=>{
    const {midi,beat,x,y}=posFromEvent(e);
    if(PR.activeTool==='draw'){
      const existing=noteAt(x,y);
      if(existing>=0){
        // Check if near right edge (resize)
        const n=PR.notes[existing];
        const nx=(n.beat+n.len)*PR.PPB;
        if(Math.abs(x-nx)<8){dragState={mode:'resize',idx:existing,startX:x,origLen:n.len};return;}
        // Drag existing note
        dragState={mode:'move',idx:existing,startX:x,startBeat:x/PR.PPB,origBeat:n.beat};return;
      }
      snapshot();
      const newIdx=PR.notes.length;
      PR.notes.push({midi,beat,len:PR.quantise||0.25,vel:100});
      dragState={mode:'resize',idx:newIdx,startX:x,origLen:PR.quantise||0.25};
      redraw();
    } else if(PR.activeTool==='erase'){
      const idx=noteAt(x,y);
      if(idx>=0){snapshot();PR.notes.splice(idx,1);redraw();}
    } else if(PR.activeTool==='select'){
      PR.selNotes.clear();
      const idx=noteAt(x,y);
      if(idx>=0){PR.selNotes.add(idx);dragState={mode:'move',idx,startX:x,startBeat:x/PR.PPB,origBeat:PR.notes[idx].beat};}
      redraw();
    }
  });

  window.addEventListener('mousemove',e=>{
    if(!dragState)return;
    const scroll=document.getElementById('pr-grid-scroll');
    const rect=c.getBoundingClientRect();
    const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left+(scroll?scroll.scrollLeft:0);
    const n=PR.notes[dragState.idx];if(!n)return;
    if(dragState.mode==='resize'){
      const newLen=Math.max(PR.quantise||0.125,(cx-n.beat*PR.PPB)/PR.PPB);
      n.len=PR.quantise>0?Math.round(newLen/PR.quantise)*PR.quantise:newLen;
    } else if(dragState.mode==='move'){
      const delta=(cx-dragState.startX)/PR.PPB;
      let nb=dragState.origBeat+delta;
      if(PR.quantise>0)nb=Math.round(nb/PR.quantise)*PR.quantise;
      n.beat=Math.max(0,nb);
    }
    redraw();
  });

  window.addEventListener('mouseup',()=>{if(dragState){dragState=null;redraw();}});
  c.addEventListener('touchstart',e=>{e.preventDefault();const {midi,beat,x,y}=posFromEvent(e);if(PR.activeTool==='draw'){const existing=noteAt(x,y);if(existing<0){snapshot();PR.notes.push({midi,beat,len:PR.quantise||0.25,vel:100});redraw();}}},{passive:false});
  c.addEventListener('touchmove',e=>{e.preventDefault();},{passive:false});
  c.addEventListener('dblclick',e=>{
    const {x,y}=posFromEvent(e);
    const idx=noteAt(x,y);
    if(idx>=0){snapshot();PR.notes.splice(idx,1);redraw();}
  });
}

/* ── SAMPLER / CHOPPER ── */
function buildSampler(el){
  const entry=S.samplerBufferId?S.buffers[S.samplerBufferId]:null;
  const fnameText=entry?`${entry.name} · ${entry.duration.toFixed(2)}s · ${S.bpm} BPM`:'No sample loaded — drop a file below or tap to browse';
  el.innerHTML=`<div class="sampler-section">
    <div class="samp-filename">${fnameText}</div>
    <div class="samp-wave" id="samp-drop"><canvas id="samp-canvas"></canvas></div>
    <div class="samp-modes">
      <button class="samp-mode${S.samplerMode==='slice'?' active':''}" onclick="setSampMode(this,'slice')">Slice</button>
      <button class="samp-mode${S.samplerMode==='chop'?' active':''}" onclick="setSampMode(this,'chop')">Chop</button>
      <button class="samp-mode${S.samplerMode==='trim'?' active':''}" onclick="setSampMode(this,'trim')">Trim</button>
      <button class="samp-mode${S.samplerMode==='stretch'?' active':''}" onclick="setSampMode(this,'stretch')">Stretch</button>
      <button class="samp-mode${S.samplerMode==='reverse'?' active':''}" onclick="setSampMode(this,'reverse')">Reverse</button>
    </div>
    <div class="samp-slices">
      <label>Slices</label>
      <button class="chop-btn sec" style="padding:3px 8px;font-size:11px;flex:0" onclick="changeSliceCount(-2)">−</button>
      <span class="slice-count" id="slic-cnt">${S.slices}</span>
      <button class="chop-btn sec" style="padding:3px 8px;font-size:11px;flex:0" onclick="changeSliceCount(2)">+</button>
    </div>
    <div class="chop-btns">
      <button class="chop-btn prim" onclick="autoChop()">⚡ Auto Chop</button>
      <button class="chop-btn sec"  onclick="chopEqual()">▦ Equal</button>
      <button class="chop-btn sec"  onclick="getSamplerFileInput().click()">Load File</button>
      <button class="chop-btn sec"  onclick="exportSampleToTrack()">→ Track</button>
    </div>
    <div id="slice-markers" class="slice-markers"></div>
  </div>`;
  requestAnimationFrame(()=>{drawSampler();buildSliceMarkers();setupSamplerDrop();});
}

let _samplerFileInput=null;
function getSamplerFileInput(){
  if(_samplerFileInput)return _samplerFileInput;
  const inp=document.createElement('input');
  inp.type='file';inp.accept='audio/*';inp.style.display='none';
  document.body.appendChild(inp);
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0];inp.value='';
    if(file)await loadSamplerFile(file);
  };
  _samplerFileInput=inp;
  return inp;
}

function setupSamplerDrop(){
  const drop=document.getElementById('samp-drop');
  if(!drop||drop._dropWired)return;
  drop._dropWired=true;
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('drop-target');});
  drop.addEventListener('dragleave',()=>drop.classList.remove('drop-target'));
  drop.addEventListener('drop',async e=>{
    e.preventDefault();drop.classList.remove('drop-target');
    const file=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
    if(file)await loadSamplerFile(file);
  });
  drop.addEventListener('click',()=>{ if(!S.samplerBufferId)getSamplerFileInput().click(); });
}

async function loadSamplerFile(file){
  toast('Decoding '+file.name+'...');
  let bufferId;
  try{ bufferId=await Audio_.decodeFile(file); }
  catch(err){ toast('Could not decode that file');return; }
  S.samplerBufferId=bufferId;
  S.samplerSlices=[];
  buildPanelContent('sampler');
  toast('Loaded '+file.name);
}

function changeSliceCount(delta){
  S.slices=Math.max(2,Math.min(64,S.slices+delta));
  document.getElementById('slic-cnt').textContent=S.slices;
  if(S.samplerBufferId&&S.samplerSlices.length){
    // Re-run whichever chop mode produced the current slices — adjusting the
    // slice-count stepper shouldn't silently switch someone from Equal back
    // to Auto/Transient chopping.
    if(S.lastChopMode==='equal') chopEqual();
    else chopTransient();
  }
  else { buildSliceMarkers(); }
}

function drawSampler(){
  const c=document.getElementById('samp-canvas');if(!c)return;
  const wrap=c.parentElement;c.width=wrap.offsetWidth;c.height=wrap.offsetHeight;
  const ctx=c.getContext('2d'),w=c.width,h=c.height;
  ctx.fillStyle='#14142a';ctx.fillRect(0,0,w,h);

  const entry=S.samplerBufferId?S.buffers[S.samplerBufferId]:null;
  if(!entry){
    ctx.fillStyle='rgba(255,255,255,.18)';ctx.font='11px system-ui';
    ctx.fillText('Drop an audio file here, or tap to browse',12,h/2+4);
    return;
  }

  const {mins,maxs,n}=entry.peaks;
  ctx.beginPath();ctx.moveTo(0,h/2);
  for(let x=0;x<=w;x++){
    const idx=Math.min(n-1,Math.floor(x/w*n));
    ctx.lineTo(x,h/2-(maxs[idx]||0)*(h/2-4));
  }
  for(let x=w;x>=0;x--){
    const idx=Math.min(n-1,Math.floor(x/w*n));
    ctx.lineTo(x,h/2-(mins[idx]||0)*(h/2-4));
  }
  ctx.fillStyle='rgba(176,110,243,.25)';ctx.fill();
  ctx.beginPath();
  for(let x=0;x<=w;x++){
    const idx=Math.min(n-1,Math.floor(x/w*n));
    const v=h/2-(maxs[idx]||0)*(h/2-4);
    if(x===0)ctx.moveTo(x,v);else ctx.lineTo(x,v);
  }
  ctx.strokeStyle='#b06ef3';ctx.lineWidth=1.5;ctx.stroke();

  // Real slice markers, in actual seconds mapped across the canvas width.
  ctx.strokeStyle='rgba(251,191,36,.8)';ctx.lineWidth=1.5;
  S.samplerSlices.forEach(sl=>{
    const x=(sl.start/entry.duration)*w;
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();
  });
}

function buildSliceMarkers(){
  const el=document.getElementById('slice-markers');if(!el)return;
  if(!S.samplerSlices.length){el.innerHTML='';return;}
  el.innerHTML=S.samplerSlices.slice(0,16).map((sl,i)=>`
    <button class="slice-marker" onclick="hitSlice(${i})">${i+1}</button>`).join('');
}

function hitSlice(i){
  const entry=S.samplerBufferId?S.buffers[S.samplerBufferId]:null;
  const sl=S.samplerSlices[i];
  if(!entry||!sl)return;
  Audio_.ensure();
  Audio_.playBuffer(entry.buffer,{
    offset:sl.start,
    duration:sl.end-sl.start,
    reverse:S.samplerMode==='reverse',
    gain:0.9,
  });
}

function setSampMode(btn,mode){
  S.samplerMode=mode;
  btn.closest('.samp-modes').querySelectorAll('.samp-mode').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

/* ══════════════════════════════════════════════════════
   TRANSIENT DETECTION — amplitude-envelope onset detector
   Finds real hit positions in a sample (kick/snare/hat attacks, vocal chops,
   loop slices) instead of just dividing the buffer into N equal pieces.
   Approach: build a smoothed amplitude envelope, look at how fast it rises
   from frame to frame, and call a peak in that "rise" curve an onset once it
   clears an adaptive threshold and enough time has passed since the last one.
   This is the same family of technique ("energy/amplitude based onset
   detection") used as the first stage in most production onset detectors —
   no FFT needed, runs on the raw samples in well under a second even for a
   multi-minute file.
═══════════════════════════════════════════════════════ */
function detectTransients(buffer,opts={}){
  const data=buffer.getChannelData(0);
  const sr=buffer.sampleRate;
  const hopSize=Math.round(sr*0.01);           // ~10ms analysis hop
  const windowSize=Math.round(sr*0.02);        // ~20ms window per envelope frame (slightly overlapping hops)
  const numFrames=Math.floor((data.length-windowSize)/hopSize);
  if(numFrames<2)return [0];

  // 1) Amplitude envelope: RMS energy per frame.
  const envelope=new Float32Array(numFrames);
  for(let f=0;f<numFrames;f++){
    const start=f*hopSize;
    let sumSq=0;
    for(let i=0;i<windowSize;i++){ const v=data[start+i]||0; sumSq+=v*v; }
    envelope[f]=Math.sqrt(sumSq/windowSize);
  }

  // 2) Light smoothing (3-frame moving average) so single-sample noise spikes
  // in the envelope itself don't masquerade as onsets.
  const smoothed=new Float32Array(numFrames);
  for(let f=0;f<numFrames;f++){
    const a=envelope[Math.max(0,f-1)],b=envelope[f],c=envelope[Math.min(numFrames-1,f+1)];
    smoothed[f]=(a+b+c)/3;
  }

  // 3) Onset strength = positive-only frame-to-frame rise ("half-wave rectified
  // first difference"). A sustained loud note has near-zero rise after its
  // initial attack, so this naturally ignores everything but actual attacks.
  const rise=new Float32Array(numFrames);
  let maxRise=0;
  for(let f=1;f<numFrames;f++){
    const d=smoothed[f]-smoothed[f-1];
    rise[f]=d>0?d:0;
    if(rise[f]>maxRise)maxRise=rise[f];
  }
  if(maxRise<=0)return [0]; // silence or DC content, nothing to detect

  // 4) HYBRID threshold: an onset clears the bar if it passes EITHER a global
  // check or a local-adaptive check. Neither alone is reliable on real music:
  //   - Global only ("X% of the loudest rise in the whole file") misses real
  //     quiet hits whenever a few hot transients elsewhere set the bar high
  //     (e.g. a soft ghost snare in a track with hard kicks).
  //   - Local-adaptive only (threshold relative to a nearby window) misses
  //     dense, UNIFORM patterns — a steady 16th-note hi-hat roll never looks
  //     "unusual" relative to its own neighbors, even though every hit is a
  //     real onset. Tested and confirmed both failure modes independently.
  // Taking either signal catches both real-world cases.
  const sensitivity=opts.sensitivity??0.18; // lower = more onsets detected
  const globalThreshold=maxRise*sensitivity;

  const localWindowSec=opts.localWindowSec??0.2; // empirically the stable middle of a 0.15-0.25s plateau
  const localWindowFrames=Math.max(4,Math.round(localWindowSec/0.01));
  const minAbsFloor=maxRise*0.015; // true digital silence/noise floor, everywhere, regardless of local level

  const localThreshold=new Float32Array(numFrames);
  for(let f=0;f<numFrames;f++){
    const lo=Math.max(0,f-localWindowFrames),hi=Math.min(numFrames,f+localWindowFrames+1);
    // Median of the local neighborhood is robust to the very peaks we're
    // trying to detect — a mean would get pulled upward by them, a median
    // mostly ignores them since they're a small minority of frames.
    const windowVals=Array.from(rise.slice(lo,hi)).sort((a,b)=>a-b);
    const median=windowVals[Math.floor(windowVals.length/2)]||0;
    let mad=0; // mean absolute deviation from the median, as a local "noisiness" measure
    for(let i=0;i<windowVals.length;i++) mad+=Math.abs(windowVals[i]-median);
    mad/=windowVals.length||1;
    localThreshold[f]=Math.max(minAbsFloor,median+mad*(1/Math.max(0.04,sensitivity)));
  }

  const minSpacingSec=opts.minSpacingSec??0.08; // ~80ms — fast hi-hat rolls survive, single-hit decay doesn't double-trigger
  const minSpacingFrames=Math.max(1,Math.round(minSpacingSec/0.01));

  // 5) Peak-pick: a frame counts as an onset if it clears EITHER threshold
  // AND is a local maximum of the rise curve AND enough frames have passed
  // since the last accepted onset.
  const onsetsSec=[0]; // always start the first slice at the very top of the file
  let lastOnsetFrame=-minSpacingFrames;
  for(let f=1;f<numFrames-1;f++){
    const clearsEither=rise[f]>=globalThreshold||rise[f]>=localThreshold[f];
    if(!clearsEither)continue;
    if(rise[f]<rise[f-1]||rise[f]<rise[f+1])continue; // not a local peak
    if(f-lastOnsetFrame<minSpacingFrames)continue;
    const sec=(f*hopSize)/sr;
    if(sec>0.02) onsetsSec.push(sec); // skip anything basically at t=0, already covered
    lastOnsetFrame=f;
  }
  return onsetsSec;
}

function buildSlicesFromOnsets(onsetsSec,totalDuration){
  const sorted=[...onsetsSec].sort((a,b)=>a-b);
  const slices=sorted.map((start,i)=>({
    start,
    end:i+1<sorted.length?sorted[i+1]:totalDuration,
  }));
  return slices.filter(s=>s.end-s.start>0.015); // drop slivers under ~15ms (analysis noise, not real hits)
}

// Equal-division chop — kept as an explicit, separate mode (per the PRD's
// distinct "Equal" vs "Transient" chop modes) rather than folded away, since
// even-grid slicing is genuinely the right tool for melodic loops where you
// want clean 1/16ths regardless of where the actual energy lands.
function chopEqual(){
  const entry=S.samplerBufferId?S.buffers[S.samplerBufferId]:null;
  if(!entry){toast('Load a sample first');return;}
  const n=S.slices,dur=entry.duration;
  S.samplerSlices=Array.from({length:n},(_,i)=>({start:dur/n*i,end:dur/n*(i+1)}));
  S.lastChopMode='equal';
  drawSampler();buildSliceMarkers();
  toast(`${n} equal slices`);
}

// Transient chop — the actual "Auto Chop" the PRD describes: real hit
// positions, not an arbitrary grid. Slice count becomes "however many
// genuine onsets were found", capped so the pad grid stays usable.
function chopTransient(){
  const entry=S.samplerBufferId?S.buffers[S.samplerBufferId]:null;
  if(!entry){toast('Load a sample first');return;}
  toast('Detecting transients…');
  const onsets=detectTransients(entry.buffer);
  let slices=buildSlicesFromOnsets(onsets,entry.duration);
  const cap=Math.max(2,S.slices);
  if(slices.length>cap){
    // Too many onsets for the pad grid (e.g. a busy hi-hat loop) — keep the
    // strongest ones by re-running with reduced sensitivity instead of just
    // truncating, so the kept slices are still the most prominent hits.
    let sens=0.18;
    while(slices.length>cap&&sens<0.9){
      sens+=0.08;
      const retry=buildSlicesFromOnsets(detectTransients(entry.buffer,{sensitivity:sens}),entry.duration);
      if(retry.length<2)break;
      slices=retry;
    }
    if(slices.length>cap) slices=slices.slice(0,cap);
  }
  S.samplerSlices=slices;
  S.lastChopMode='transient';
  drawSampler();buildSliceMarkers();
  toast(slices.length===1?'No clear transients found — try Equal chop':`${slices.length} transients detected`);
}

// "Auto Chop" button now runs real onset detection by default — this is the
// behavior change the PRD calls for ("Auto Slice" should mean transient-
// aware, not an even grid). Equal-division is still one tap away via its own
// mode button so neither workflow is lost.
function autoChop(){ chopTransient(); }

// Export the currently loaded+chopped sample to a real clip on the active track,
// trimmed to the first slice's region if slices exist, or the full sample otherwise.
function exportSampleToTrack(){
  const entry=S.samplerBufferId?S.buffers[S.samplerBufferId]:null;
  if(!entry){toast('Load a sample first');return;}
  const t=S.tracks[S.activeTrack];
  if(!t){toast('Select a track first');return;}
  const region=S.samplerSlices[0]||{start:0,end:entry.duration};
  const regionDur=region.end-region.start;
  const lenBeats=Math.max(0.25,secToBeat(regionDur));
  const startBeat=secToBeat(S.sec);
  snapshot();
  t.clips.push({
    id:'clip_'+Date.now(),
    start:Math.round(startBeat*4)/4,
    len:lenBeats,
    label:entry.name.replace(/\.[^.]+$/,'')+'_chop',
    bufferId:S.samplerBufferId,
    trimStart:region.start,
    reverse:S.samplerMode==='reverse',
  });
  renderTracks();
  if(S.playing){ stopAllScheduled(); scheduleClipPlayback(); }
  toast('Added to '+t.name);
}

/* ── EFFECTS ── */
const FX_TYPES=[
  {type:'reverb',label:'Reverb',wetLabel:'Mix'},
  {type:'delay',label:'Delay',wetLabel:'Mix'},
  {type:'chorus',label:'Chorus',wetLabel:'Mix'},
  {type:'eq',label:'EQ Tilt',wetLabel:'Tone'},
  {type:'compressor',label:'Compressor',wetLabel:'Amount'},
];

function buildFX(el){
  const t=S.tracks[S.activeTrack];
  if(!t){el.innerHTML='<div class="fx-name">No track selected</div>';return;}
  if(!S.trackFx[t.id])S.trackFx[t.id]=[];
  const rack=S.trackFx[t.id];

  const slots=rack.map((f,i)=>{
    const meta=FX_TYPES.find(x=>x.type===f.type)||{label:f.type,wetLabel:'Mix'};
    const deg=(f.wet*270)-135;
    return `<div class="fx-slot">
      <div class="fx-name">${meta.label}</div>
      <input type="range" class="fx-wet-slider" min="0" max="100" value="${Math.round(f.wet*100)}" data-idx="${i}" title="${meta.wetLabel}">
      <div class="fx-val">${Math.round(f.wet*100)}%</div>
      <button class="fx-toggle${f.on?' on':''}" onclick="toggleFX(${i},this)"></button>
      <button class="fx-remove-btn" onclick="removeFX(${i})" title="Remove">✕</button>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="ctrl-group" style="margin-bottom:10px;">
      <select class="auto-param" id="fxTrackSelect">
        ${S.tracks.map((tt,i)=>`<option value="${i}"${i===S.activeTrack?' selected':''}>${tt.name}</option>`).join('')}
      </select>
    </div>
    ${slots||'<div class="fx-name" style="opacity:.5;margin-bottom:8px;">No effects on this track yet</div>'}
    <div class="fx-add-row">
      ${FX_TYPES.map(meta=>`<button class="fx-add-chip" onclick="addFX('${meta.type}')">＋ ${meta.label}</button>`).join('')}
    </div>`;

  document.getElementById('fxTrackSelect').addEventListener('change',e=>{
    S.activeTrack=parseInt(e.target.value,10);buildPanelContent('fx');
  });
  el.querySelectorAll('.fx-wet-slider').forEach(slider=>{
    slider.addEventListener('input',()=>{
      const idx=parseInt(slider.dataset.idx,10);
      const v=parseInt(slider.value,10)/100;
      rack[idx].wet=v;
      slider.parentElement.querySelector('.fx-val').textContent=Math.round(v*100)+'%';
      const liveNode=(Audio_.trackFxNodes[t.id]||[])[idx];
      if(liveNode&&liveNode.setWet)liveNode.setWet(v); // live-update without a full rebuild while dragging
    });
    slider.addEventListener('change',()=>{ Audio_.rebuildTrackFxRack(t.id); }); // settle into a clean rebuild on release
  });
}

function toggleFX(i,btn){
  const t=S.tracks[S.activeTrack];
  S.trackFx[t.id][i].on=!S.trackFx[t.id][i].on;
  btn.classList.toggle('on',S.trackFx[t.id][i].on);
  Audio_.rebuildTrackFxRack(t.id);
}
function addFX(type){
  const t=S.tracks[S.activeTrack];if(!t)return;
  if(!S.trackFx[t.id])S.trackFx[t.id]=[];
  S.trackFx[t.id].push({type,on:true,wet:0.35});

function setupFaderDrags(){
  document.querySelectorAll('.mix-thumb').forEach(thumb=>{
    const trackId=thumb.dataset.isMaster==='true'?null:Number(thumb.dataset.trackId);
    const isMaster=thumb.dataset.isMaster==='true';
    const onDown=e=>{
      e.stopPropagation();
      const startY=e.touches?e.touches[0].clientY:e.clientY;
      const startTop=parseFloat(thumb.style.top);
      const onMove=ev=>{
        const cy=ev.touches?ev.touches[0].clientY:ev.clientY;
        const newTop=Math.max(0,Math.min(86,startTop+(cy-startY)));
        thumb.style.top=newTop+'%';
        const gainVal=Math.max(0,Math.min(1,(100-newTop)/100));
        if(isMaster)Audio_.setMasterVol(gainVal);
        else Audio_.setTrackFader(trackId,gainVal);
      };
      const onUp=()=>{
        window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);
        window.removeEventListener('touchmove',onMove);window.removeEventListener('touchend',onUp);
      };
      window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
      window.addEventListener('touchmove',onMove,{passive:true});window.addEventListener('touchend',onUp);
    };
    thumb.addEventListener('mousedown',onDown);
    thumb.addEventListener('touchstart',onDown,{passive:true});
  });
}

function currentAutoLane(){
  const t=S.tracks[S.activeTrack];if(!t)return null;
  if(!S.automation[t.id])S.automation[t.id]={};

// Visible automation window mirrors the main timeline's zoom level (pxPerBeat),
// so zooming the timeline in/out also zooms automation editing precision in sync.
// x=0 of the automation canvas always represents beat 0 (S.scrollX is unused/always
// 0 in this build, so there's no horizontal-pan offset to account for yet).
function autoCanvasBeatRange(canvasWidth){
  const visibleBeats=canvasWidth/pxPerBeat();
  return {start:0,end:Math.max(1,visibleBeats)};
}

function drawAutoCanvas(){
  const c=document.getElementById('auto-canvas');if(!c)return;
  const wrap=c.parentElement;
  c.width=wrap.offsetWidth;c.height=Math.max(100,wrap.offsetHeight);
  const ctx=c.getContext('2d'),w=c.width,h=c.height;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  [.25,.5,.75].forEach(y=>{ctx.beginPath();ctx.moveTo(0,y*h);ctx.lineTo(w,y*h);ctx.stroke();});

  const {start,end}=autoCanvasBeatRange(w);
  // Bar gridlines (every 4 beats) instead of a fixed 8-column split, so the grid
  // itself reflects real musical time at the current zoom level.
  const firstBar=Math.ceil(start/4)*4;
  for(let beat=firstBar;beat<=end;beat+=4){
    const x=((beat-start)/(end-start))*w;
    const isDownbeat=(beat/4)%4===0;
    ctx.strokeStyle=isDownbeat?'rgba(255,255,255,0.14)':'rgba(255,255,255,0.06)';
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();
    if(isDownbeat){
      ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font='8px system-ui';
      ctx.fillText(`${beat/4+1}`,x+3,10);
    }
  }

  const lane=currentAutoLane();
  const beatToPx=beat=>((beat-start)/(end-start))*w;
  // value 0..1 maps top(1)->y=0 .. bottom(0)->y=h, matching how draw-mode writes points.
  const valToPx=v=>h-(v*h);

  if(!lane||lane.length<2){
    if(lane&&lane.length===1){
      const x=beatToPx(lane[0].beat),y=valToPx(lane[0].value);
      ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fillStyle='#b06ef3';ctx.fill();
    }
    const phX=beatToPx(secToBeat(S.sec));ctx.beginPath();ctx.moveTo(phX,0);ctx.lineTo(phX,h);ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1.5;ctx.stroke();
    return;
  }
  const pts=lane.map(p=>({x:beatToPx(p.beat),y:valToPx(p.value)}));
  ctx.beginPath();ctx.moveTo(pts[0].x,h);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.lineTo(pts[pts.length-1].x,h);ctx.closePath();
  ctx.fillStyle='rgba(176,110,243,.12)';ctx.fill();
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  pts.forEach(p=>ctx.lineTo(p.x,p.y));
  ctx.strokeStyle='#b06ef3';ctx.lineWidth=2;ctx.stroke();
  pts.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle='#b06ef3';ctx.fill();ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.5;ctx.stroke();});
  const phX=beatToPx(secToBeat(S.sec));ctx.beginPath();ctx.moveTo(phX,0);ctx.lineTo(phX,h);ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=1.5;ctx.stroke();
}
let autoDrag=false;
function autoDown(e){autoDrag=true;const c=document.getElementById('auto-canvas');if(!c)return;const r=c.getBoundingClientRect();addAutoPoint(e.clientX-r.left,e.clientY-r.top);}
function autoMove(e){if(!autoDrag)return;const c=document.getElementById('auto-canvas');if(!c)return;const r=c.getBoundingClientRect();addAutoPoint(e.clientX-r.left,e.clientY-r.top);}
function autoTouchDown(e){autoDrag=true;const c=document.getElementById('auto-canvas');if(!c)return;const r=c.getBoundingClientRect();addAutoPoint(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);}
function autoTouchMove(e){if(!autoDrag)return;const c=document.getElementById('auto-canvas');if(!c)return;const r=c.getBoundingClientRect();addAutoPoint(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);}
document.addEventListener('mouseup',()=>autoDrag=false);document.addEventListener('touchend',()=>autoDrag=false);

function addAutoPoint(x,y){
  const c=document.getElementById('auto-canvas');if(!c)return;
  const w=c.width,h=c.height;
  const {start,end}=autoCanvasBeatRange(w);
  const beat=start+(x/w)*(end-start);
  const value=Math.max(0,Math.min(1,1-(y/h)));
  let lane=currentAutoLane();if(!lane)return;

  if(S.autoMode==='erase'){
    const lanePts=lane.map(p=>({x:((p.beat-start)/(end-start))*w,y:h-(p.value*h)}));
    const keepIdx=lanePts.map((p,i)=>Math.hypot(p.x-x,p.y-y)>20?i:-1).filter(i=>i>=0);
    const newLane=keepIdx.map(i=>lane[i]);
    S.automation[S.tracks[S.activeTrack].id][S.autoParam]=newLane;
    drawAutoCanvas();
    applyAutomationIfPlaying();
    return;
  }
  lane.push({beat,value});
  lane.sort((a,b)=>a.beat-b.beat);
  if(lane.length>200)lane.splice(0,lane.length-200);
  drawAutoCanvas();
  applyAutomationIfPlaying();
}
function clearAuto(){
  const t=S.tracks[S.activeTrack];if(!t)return;
  if(S.automation[t.id])S.automation[t.id][S.autoParam]=[];
  drawAutoCanvas();
  applyAutomationIfPlaying();
  toast('Automation cleared');
}

// ── Apply automation lanes to real AudioParams ──
// Volume/Pan/Filter each map a lane's normalized 0..1 values onto the matching
// AudioParam's real range, then schedule the whole curve onto the param with
// linearRampToValueAtTime so it actually moves during playback — not just drawn.
function paramRangeFor(param){
  switch(param){
    case'volume':return {min:0,max:1};
    case'pan':return {min:-1,max:1};
    case'filter':return {min:200,max:20000,log:true}; // lowpass cutoff, log-scaled for a musical sweep
    default:return null; // reverb: no real param to automate yet
  }
}
function lerp(a,b,t){return a+(b-a)*t;}
function valueToParamRange(param,norm){
  const r=paramRangeFor(param);if(!r)return null;
  if(r.log){
    const lo=Math.log(r.min),hi=Math.log(r.max);
    return Math.exp(lerp(lo,hi,norm));
  }
  return lerp(r.min,r.max,norm);
}

function applyTrackAutomation(trackId,param,audioParam,baseValueWhenEmpty){
  const lane=S.automation[trackId]&&S.automation[trackId][param];
  const ctx=Audio_.ctx;
  audioParam.cancelScheduledValues(ctx.currentTime);
  if(!lane||lane.length===0){
    audioParam.setValueAtTime(baseValueWhenEmpty,ctx.currentTime);
    return;
  }
  if(lane.length===1){
    audioParam.setValueAtTime(valueToParamRange(param,lane[0].value),ctx.currentTime);
    return;
  }
  const nowBeat=secToBeat(S.sec);
  const ctxNow=ctx.currentTime;
  // Hold at (or interpolate to) the correct starting value, then ramp through
  // every future point in the lane relative to the current transport position.
  let started=false;
  for(let i=0;i<lane.length;i++){
    const p=lane[i];
    const pTimeSec=ctxNow+beatToSec(p.beat-nowBeat);
    if(p.beat<nowBeat){
      // Points in the past just set the starting value immediately; the most
      // recent past point "wins" as the value already in effect right now.
      audioParam.setValueAtTime(valueToParamRange(param,p.value),ctxNow);
      continue;
    }
    if(!started){
      audioParam.setValueAtTime(valueToParamRange(param,p.value),Math.max(ctxNow,pTimeSec));
      started=true;
    } else {
      audioParam.linearRampToValueAtTime(valueToParamRange(param,p.value),pTimeSec);
    }
  }
}

// Called whenever a lane is edited while the transport is running, and also
// right when playback starts, so automation takes effect immediately rather
// than only on the next manual re-trigger.
function applyAutomationIfPlaying(){
  if(!S.playing)return;
  applyAllTrackAutomation();
}
function applyAllTrackAutomation(){
  Audio_.ensure();
  const anySolo=S.tracks.some(tt=>tt.s);
  S.tracks.forEach(t=>{
    const gainNode=Audio_.ensureTrackGain(t.id);
    const pannerNode=Audio_.ensureTrackPanner(t.id);
    const filterNode=Audio_.ensureTrackFilter(t.id);
    const silent=t.m||(anySolo&&!t.s);
    const dry=Audio_.trackDry[t.id]??0.85;
    if(silent){
      // Mute/solo silencing wins outright — even an automated volume swell
      // shouldn't be audible on a muted track.
      gainNode.gain.cancelScheduledValues(Audio_.ctx.currentTime);
      gainNode.gain.setValueAtTime(0,Audio_.ctx.currentTime);
    } else {
      applyTrackAutomation(t.id,'volume',gainNode.gain,dry);
    }
    applyTrackAutomation(t.id,'pan',pannerNode.pan,0);
    applyTrackAutomation(t.id,'filter',filterNode.frequency,20000);
  });
}

let vuRaf;
function animateVU(){
  cancelAnimationFrame(vuRaf);
  const c=document.getElementById('rec-canvas');if(!c)return;
  c.width=c.parentElement.offsetWidth;c.height=c.parentElement.offsetHeight;
  function tick(){
    const ctx=c.getContext('2d'),w=c.width,h=c.height;
    ctx.fillStyle='#14142a';ctx.fillRect(0,0,w,h);
    const bars=32;
    let levels=null;
    if(S.recording&&S.recAnalyser&&S.recDataArr){
      S.recAnalyser.getByteTimeDomainData(S.recDataArr);
      // Derive a single instantaneous RMS-ish level from the waveform sample, then
      // fan it out across the bar meter with slight per-bar variation for visual life.
      let sumSq=0;
      for(let i=0;i<S.recDataArr.length;i++){ const v=(S.recDataArr[i]-128)/128; sumSq+=v*v; }
      const rms=Math.sqrt(sumSq/S.recDataArr.length);
      S.inputLevel=rms;
      levels=Array.from({length:bars},()=>Math.min(1,rms*(2.2+Math.random()*0.6)));
    }
    for(let i=0;i<bars;i++){
      const lv=levels?levels[i]:(S.playing?(0.2+Math.random()*.8):(0.05+Math.random()*.1));
      const bh=lv*h;const bw=w/bars-1;const x=i*(w/bars);
      const grad=ctx.createLinearGradient(0,h,0,h-bh);
      grad.addColorStop(0,'#4ade80');grad.addColorStop(.6,'#fbbf24');grad.addColorStop(1,'#f87171');
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.roundRect(x+.5,h-bh,bw,bh,2);ctx.fill();
    }
    if(S.activePanel==='rec')vuRaf=requestAnimationFrame(tick);
  }
  tick();
}

/* ═══════════════════════════════════════════════════════════════
   PHASE 6A — MPC PAD BANKS + NOTE REPEAT + 16 LEVELS + SWING
   Upgrades the sampler's slice-marker row into a full
   4×4 MPC-style pad grid with banks A/B/C/D (64 pads total),

═══════════════════════════════════════════════════════════════ */
Object.assign(S,{

/* Replace buildSampler to inject the MPC grid beneath the existing waveform UI */
const _origBuildSampler=window.buildSampler;

    </div>

      <span class="slice-count" id="slic-cnt">${S.slices}</span>

    </div>

    <!-- MPC pad bank selector -->
    <div class="mpc-bank-row" style="margin-top:8px;">
      ${['A','B','C','D'].map(b=>`<button class="mpc-bank-btn${S.padBank===b?' active':''}"
        onclick="switchPadBank('${b}',this)">${b}</button>`).join('')}
      <div style="flex:1"></div>
      <button class="mpc-feat-btn${S.noteRepeat?' active':''}" id="mpc-nr"  onclick="toggleNoteRepeat(this)">♾ Repeat</button>
      <button class="mpc-feat-btn${S.mpc16Levels?' active':''}" id="mpc-16" onclick="toggle16Levels(this)">16 Lv</button>

        oninput="S.mpcSwing=+this.value;document.getElementById('mpc-swing-v').textContent=this.value+'%'">
      <span id="mpc-swing-v">${S.mpcSwing}%</span>

    <div id="mpc-pad-grid" class="mpc-pad-grid"></div>
  </div>`;

};

function buildMpcPadGrid(){
  const grid=document.getElementById('mpc-pad-grid');if(!grid)return;
  const asgns=S.padBanks[S.padBank];
  const entry=S.samplerBufferId?S.buffers[S.samplerBufferId]:null;
  const col=(S.tracks[S.activeTrack]||{color:'#b06ef3'}).color;
  // Auto-populate bank A from current slices if empty
  if(S.padBank==='A'&&asgns.length===0&&S.samplerSlices.length){
    S.padBanks.A=S.samplerSlices.slice(0,16).map((_,i)=>({sliceIdx:i,vel:100,pitch:0}));
  }
  grid.innerHTML=Array.from({length:16},(_,i)=>{
    const asgn=asgns[i];
    const has=asgn!=null&&S.samplerSlices[asgn?.sliceIdx]!=null;
    return `<div class="mpc-pad${has?'':' empty'}"
      style="background:${col}${has?'22':'0d'};border-color:${col}${has?'55':'22'};"
      id="mpc-pad-${i}"
      ontouchstart="hitMpcPad(${i},event)" onclick="hitMpcPad(${i},event)">
      <span class="mpc-pad-num">${S.padBank}${i+1}</span>
      <span class="mpc-pad-lbl">${has?(i+1):'—'}</span>
      ${has?`<span class="mpc-pad-vel">${asgns[i].vel}</span>`:''}
    </div>`;
  }).join('');
}

/* Auto-sync pad grid after every chop */
const _origAutoChop=window.autoChop;
window.autoChop=function(){
  _origAutoChop();
  // After chopTransient finishes (it's synchronous), rebuild pads
  setTimeout(()=>{
    S.padBanks.A=S.samplerSlices.slice(0,16).map((_,i)=>({sliceIdx:i,vel:100,pitch:0}));
    buildMpcPadGrid();
  },50);
};

    S.padBanks.A=S.samplerSlices.slice(0,16).map((_,i)=>({sliceIdx:i,vel:100,pitch:0}));
    buildMpcPadGrid();
  },50);
};

function hitMpcPad(i,e){
  e&&e.stopPropagation();
  // Auto-assign if slot empty and slice exists
  if(!S.padBanks[S.padBank][i]){
    if(S.samplerSlices[i]){
      S.padBanks[S.padBank][i]={sliceIdx:i,vel:100,pitch:0};
      buildMpcPadGrid();
    }
    return;
  }
  const asgn=S.padBanks[S.padBank][i];
  const entry=S.samplerBufferId?S.buffers[S.samplerBufferId]:null;
  const sl=S.samplerSlices[asgn.sliceIdx];
  if(!entry||!sl)return;

  // 16 Levels: each row is a different velocity tier (0-3 = soft, 4-7 = med-soft, etc.)
  const vel=S.mpc16Levels?Math.round(((i+1)/16)*127):(asgn.vel??100);

  // Swing: even pads (2nd/4th of each beat) get a slight onset delay
  const swingDelay=(S.mpcSwing>0&&i%2===1)?beatToSec(S.mpcSwing/200*S.mpcQuantise):0;

  const pad=document.getElementById('mpc-pad-'+i);
  if(pad){pad.classList.add('hit');setTimeout(()=>pad?.classList.remove('hit'),110);}

  const doPlay=()=>{
    Audio_.ensure();
    Audio_.playBuffer(entry.buffer,{
      offset:sl.start,duration:sl.end-sl.start,
      gain:vel/127,reverse:S.samplerMode==='reverse',
    });
  };
  if(swingDelay>0)setTimeout(doPlay,swingDelay*1000); else doPlay();

  // Note repeat: schedule additional hits while pad held
  if(S.noteRepeat&&!pad._repeatTmr){
    const intervalMs=beatToSec(S.noteRepeatRate)*1000;
    pad._repeatTmr=setInterval(doPlay,intervalMs);
    const stopRepeat=()=>{clearInterval(pad._repeatTmr);delete pad._repeatTmr;};
    pad.addEventListener('mouseup',stopRepeat,{once:true});
    pad.addEventListener('touchend',stopRepeat,{once:true});
  }
}

function switchPadBank(bank,btn){
  S.padBank=bank;
  btn.closest('.mpc-bank-row').querySelectorAll('.mpc-bank-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  buildMpcPadGrid();
}
function toggleNoteRepeat(btn){S.noteRepeat=!S.noteRepeat;btn.classList.toggle('active',S.noteRepeat);toast(S.noteRepeat?'Note Repeat ON':'Note Repeat OFF');}
function toggle16Levels(btn){S.mpc16Levels=!S.mpc16Levels;btn.classList.toggle('active',S.mpc16Levels);toast(S.mpc16Levels?'16 Levels ON':'16 Levels OFF');}


/* ═══════════════════════════════════════════════════════════════
   PHASE 6B — VELOCITY LANE DRAG EDITING
═══════════════════════════════════════════════════════════════ */
(function initVelEditor(){
  let drag=null;
  const observer=new MutationObserver(attachVelEditor);
  const dp=document.getElementById('dp-piano');
  if(dp)observer.observe(dp,{childList:true,subtree:true});

  function attachVelEditor(){
    const wrap=document.getElementById('pr-vel-canvas')?.parentElement;
    if(!wrap||wrap._velWired)return;
    wrap._velWired=true;

    const posVel=(py,h)=>Math.max(1,Math.min(127,Math.round((1-py/h)*127)));
    const nearestNote=(px,w)=>{
      const beatsTotal=PR.BARS*PR.BEATS_PER_BAR;
      const beat=(px/w)*beatsTotal;
      let best=-1,bd=Infinity;
      PR.notes.forEach((n,i)=>{const d=Math.abs(n.beat-beat);if(d<bd&&d<0.75){bd=d;best=i;}});
      return best;
    };
    const redraw=()=>{const col=(S.tracks[S.activeTrack]||{}).color||'#b06ef3';prDrawGrid(col);prDrawVelocity(col);};

    wrap.addEventListener('mousedown',e=>{
      const r=wrap.getBoundingClientRect(),px=e.clientX-r.left,py=e.clientY-r.top;
      if(e.shiftKey){drag={range:true,x0:px,y:py,h:r.height,w:r.width};return;}
      const idx=nearestNote(px,r.width);if(idx<0)return;
      snapshot();PR.notes[idx].vel=posVel(py,r.height);redraw();
      drag={idx,h:r.height,w:r.width};e.preventDefault();
    });
    window.addEventListener('mousemove',e=>{
      if(!drag)return;
      const r=wrap.getBoundingClientRect(),py=e.clientY-r.top;
      if(drag.range){
        const x0=Math.min(drag.x0,e.clientX-r.left),x1=Math.max(drag.x0,e.clientX-r.left);
        const beatsTotal=PR.BARS*PR.BEATS_PER_BAR;
        const b0=(x0/drag.w)*beatsTotal,b1=(x1/drag.w)*beatsTotal;
        const vel=posVel(py,drag.h);
        PR.notes.forEach(n=>{if(n.beat>=b0&&n.beat<=b1)n.vel=vel;});
      } else {PR.notes[drag.idx].vel=posVel(py,drag.h);}
      redraw();
    });
    window.addEventListener('mouseup',()=>{drag=null;});
    wrap.addEventListener('touchstart',e=>{
      const r=wrap.getBoundingClientRect(),t=e.touches[0];
      const idx=nearestNote(t.clientX-r.left,r.width);if(idx<0)return;
      snapshot();drag={idx,h:r.height,w:r.width};e.preventDefault();
    },{passive:false});
    wrap.addEventListener('touchmove',e=>{
      if(!drag||drag.range)return;
      const r=wrap.getBoundingClientRect(),py=e.touches[0].clientY-r.top;
      PR.notes[drag.idx].vel=Math.max(1,Math.min(127,Math.round((1-py/drag.h)*127)));
      redraw();e.preventDefault();
    },{passive:false});
    wrap.addEventListener('touchend',()=>{drag=null;});
  }
})();

/* ═══════════════════════════════════════════════════════════════
   PHASE 6D — WEB AUDIO MIDI NOTE PLAYBACK IN PIANO ROLL
═══════════════════════════════════════════════════════════════ */
function prPlayMidiNote(midi,vel=100,durSec=0.3){
  Audio_.ensure();
  const ctx=Audio_.ctx,t0=ctx.currentTime;
  const freq=440*Math.pow(2,(midi-69)/12);
  const gv=(vel/127)*0.5;
  const g=ctx.createGain();
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(gv,t0+0.008);
  g.gain.exponentialRampToValueAtTime(gv*0.55,t0+0.06);
  g.gain.exponentialRampToValueAtTime(0.0001,t0+durSec);
  const osc=ctx.createOscillator();
  osc.type=midi<48?'sine':midi<72?'sawtooth':'triangle';
  if(midi>=48&&midi<72){
    const lp=ctx.createBiquadFilter();lp.type='lowpass';
    lp.frequency.setValueAtTime(freq*4,t0);lp.frequency.exponentialRampToValueAtTime(freq*1.5,t0+durSec);
    osc.connect(lp);lp.connect(g);
  } else {osc.connect(g);}
  // Sub oscillator for body
  if(midi>=48){
    const sub=ctx.createOscillator();sub.type='sine';sub.frequency.value=freq/2;
    const sg=ctx.createGain();sg.gain.value=0.12;sub.connect(sg);sg.connect(g);
    sub.start(t0);sub.stop(t0+durSec+0.01);
  }
  g.connect(Audio_.master);
  osc.frequency.value=freq;osc.start(t0);osc.stop(t0+durSec+0.01);
  prFlashKey(midi);
}

function prFlashKey(midi){
  const kc=document.getElementById('pr-keys-col');if(!kc)return;
  const row=PR.MIDI_TOP-midi;
  const flash=document.createElement('div');
  flash.className='pr-note-flash';
  flash.style.cssText=`top:${row*PR.NOTE_H}px;height:${PR.NOTE_H}px;`;
  kc.appendChild(flash);setTimeout(()=>flash.remove(),400);
}

function syncPRPlayhead(){
  const gc=document.getElementById('pr-canvas');

  if(!gc||!scroll)return;
  const nowBeat=secToBeat(S.sec);
  if(Math.abs(nowBeat-_prLastBeat)<0.02)return;
  _prLastBeat=nowBeat;
  if(S.playing&&_prFollowOn){
    const phX=Math.min(nowBeat,PR.BARS*PR.BEATS_PER_BAR)*PR.PPB;
    const vw=scroll.clientWidth,sl=scroll.scrollLeft;
    if(phX<sl+vw*0.1||phX>sl+vw*0.8)scroll.scrollLeft=Math.max(0,phX-vw*0.25);

/* ═══════════════════════════════════════════════════════════════
   PHASE 6F — REAL MIDI DEVICE INPUT
   navigator.requestMIDIAccess → note-on/off → piano roll
   record, drum pad trigger, CC mapping + MIDI learn.
═══════════════════════════════════════════════════════════════ */
const MIDI_={
  access:null,inputs:{},
  learnMode:false,learnTarget:null,
  ccMap:{},noteChannel:0,drumChannel:9,
};
PR._midiRec=false;PR._heldNotes={};

async function initMIDI(){
  if(!navigator.requestMIDIAccess){toast('Web MIDI not supported');return;}
  try{
    MIDI_.access=await navigator.requestMIDIAccess({sysex:false});
    MIDI_.access.inputs.forEach(p=>{MIDI_.inputs[p.id]=p;p.onmidimessage=onMIDIMsg;});
    MIDI_.access.onstatechange=e=>{
      if(e.port.type==='input'){
        if(e.port.state==='connected'){MIDI_.inputs[e.port.id]=e.port;e.port.onmidimessage=onMIDIMsg;}
        else{if(MIDI_.inputs[e.port.id])MIDI_.inputs[e.port.id].onmidimessage=null;delete MIDI_.inputs[e.port.id];}
      }
      toast(`MIDI: ${e.port.name} ${e.port.state}`);refreshMidiList();
    };
    toast(`MIDI ready · ${MIDI_.access.inputs.size} device(s)`);refreshMidiList();
  }catch(err){toast('MIDI denied: '+err.message);}
}

function onMIDIMsg(e){
  const [st,d1,d2]=e.data,type=st&0xF0,ch=st&0x0F;
  if(type===0x90&&d2>0)onMidiNoteOn(d1,d2,ch);
  else if(type===0x80||(type===0x90&&d2===0))onMidiNoteOff(d1,ch);
  else if(type===0xB0)onMidiCC(d1,d2,ch);
  else if(type===0xE0)onMidiPitchBend(((d2<<7)|d1)-8192,ch);
}

const DRUM_MAP={36:'KICK',38:'SNARE',42:'HI-HAT',46:'OPEN',49:'CRASH',51:'RIDE',
  37:'RIM',41:'TOM',43:'TOM',45:'TOM',47:'TOM',39:'CLAP',54:'SHAKER'};

function onMidiNoteOn(midi,vel,ch){
  if(ch===MIDI_.drumChannel){
    const name=DRUM_MAP[midi]||'KICK';
    Audio_.synthDrum(name);
    const pads=document.querySelectorAll('.pad-btn');
    const idx=Object.keys(DRUM_MAP).indexOf(String(midi));
    if(idx>=0&&pads[idx]){pads[idx].classList.add('hit');setTimeout(()=>pads[idx]?.classList.remove('hit'),100);}
    return;
  }
  if(S.activePanel==='sampler'){const pi=(midi-48);if(pi>=0&&pi<16)hitMpcPad(pi,null);return;}
  prPlayMidiNote(midi,vel,0.4);
  if(PR._midiRec&&document.getElementById('pr-canvas')){
    snapshot();const nowBeat=secToBeat(S.sec);
    PR.notes.push({midi,beat:nowBeat,len:0.25,vel});
    PR._heldNotes[midi]={idx:PR.notes.length-1,startBeat:nowBeat};
    const col=(S.tracks[S.activeTrack]||{}).color||'#b06ef3';
    prDrawGrid(col);prDrawVelocity(col);
  }
}
function onMidiNoteOff(midi,ch){
  const held=PR._heldNotes[midi];
  if(held){
    const nowBeat=secToBeat(S.sec);
    if(PR.notes[held.idx])PR.notes[held.idx].len=Math.max(0.125,nowBeat-held.startBeat);
    delete PR._heldNotes[midi];
    const col=(S.tracks[S.activeTrack]||{}).color||'#b06ef3';
    prDrawGrid(col);prDrawVelocity(col);
  }
}
function onMidiCC(cc,val,ch){
  if(MIDI_.learnMode&&MIDI_.learnTarget){
    MIDI_.ccMap[cc]=MIDI_.learnTarget;
    toast(`Learned CC${cc} → ${MIDI_.learnTarget}`);
    MIDI_.learnMode=false;MIDI_.learnTarget=null;refreshMidiList();return;
  }
  const map=MIDI_.ccMap[cc];if(!map)return;
  const norm=val/127;
  if(map==='volume')Audio_.setMasterVol(norm);
  else if(map==='bpm'){S.bpm=Math.round(60+norm*160);document.getElementById('bpm-disp').textContent=S.bpm;}
}

/* ═══════════════════════════════════════════════════════════════
   PHASE 6G — CLIP EDITING: FADE, PITCH, STRETCH, CROSSFADE, BOUNCE
   All non-destructive. Metadata on clip; scheduler reads it.
═══════════════════════════════════════════════════════════════ */
function ctxFadeIn(){
  if(!S.selectedClip){ctxMenu.style.display='none';return;}
  const {ti,ci}=S.selectedClip,clip=S.tracks[ti].clips[ci];
  snapshot();clip.fadeIn=Math.min(clip.len,1);renderTracks();
  if(S.playing){stopAllScheduled();scheduleClipPlayback();}
  toast('Fade in applied');ctxMenu.style.display='none';
}
function ctxFadeOut(){
  if(!S.selectedClip){ctxMenu.style.display='none';return;}
  const {ti,ci}=S.selectedClip,clip=S.tracks[ti].clips[ci];
  snapshot();clip.fadeOut=Math.min(clip.len,1);renderTracks();
  if(S.playing){stopAllScheduled();scheduleClipPlayback();}
  toast('Fade out applied');ctxMenu.style.display='none';
}
function ctxClipGain(){
  if(!S.selectedClip){ctxMenu.style.display='none';return;}
  const {ti,ci}=S.selectedClip,clip=S.tracks[ti].clips[ci];
  ctxMenu.style.display='none';
  showInlineEdit('Clip gain (%)',Math.round((clip.gain||1)*100),v=>{
    clip.gain=Math.max(0,Math.min(8,parseInt(v,10)||100)/100);
    renderTracks();if(S.playing){stopAllScheduled();scheduleClipPlayback();}
    toast(`Gain: ${Math.round(clip.gain*100)}%`);
  });
}
function ctxPitchShift(){
  if(!S.selectedClip){ctxMenu.style.display='none';return;}
  const {ti,ci}=S.selectedClip,clip=S.tracks[ti].clips[ci];
  ctxMenu.style.display='none';
  showInlineEdit('Pitch shift (semitones, e.g. −5 to +12)',clip.pitchShift||0,v=>{
    snapshot();clip.pitchShift=Math.max(-24,Math.min(24,parseFloat(v)||0));
    patchSchedulerForClipOpts();
    if(S.playing){stopAllScheduled();scheduleClipPlayback();}
    toast(`Pitch: ${clip.pitchShift>0?'+':''}${clip.pitchShift} st`);
  });
}
function ctxStretch(){
  if(!S.selectedClip){ctxMenu.style.display='none';return;}
  const {ti,ci}=S.selectedClip,clip=S.tracks[ti].clips[ci];
  ctxMenu.style.display='none';
  showInlineEdit('Playback rate (1=normal, 0.5=half speed, 2=double)',clip.playbackRate||1,v=>{
    snapshot();clip.playbackRate=Math.max(0.1,Math.min(4,parseFloat(v)||1));
    patchSchedulerForClipOpts();
    if(S.playing){stopAllScheduled();scheduleClipPlayback();}
    toast(`Stretch ×${clip.playbackRate}`);
  });
}
function ctxCrossfade(){
  if(!S.selectedClip){ctxMenu.style.display='none';return;}
  const {ti,ci}=S.selectedClip,t=S.tracks[ti],clip=t.clips[ci],next=t.clips[ci+1];
  if(!next){toast('No next clip');ctxMenu.style.display='none';return;}
  snapshot();
  const xl=Math.min(0.5,clip.len/2,next.len/2);
  clip.fadeOut=xl;next.fadeIn=xl;next.start=clip.start+clip.len-xl;
  renderTracks();if(S.playing){stopAllScheduled();scheduleClipPlayback();}
  toast('Crossfade applied');ctxMenu.style.display='none';
}
async function ctxBounce(){
  if(!S.selectedClip){ctxMenu.style.display='none';return;}
  const {ti,ci}=S.selectedClip,clip=S.tracks[ti].clips[ci];
  if(!clip.bufferId){toast('No audio to bounce');ctxMenu.style.display='none';return;}
  const entry=S.buffers[clip.bufferId];ctxMenu.style.display='none';
  if(!entry)return;
  toast('Bouncing…');
  const sr=entry.buffer.sampleRate;
  const s0=Math.floor((clip.trimStart||0)*sr);
  const s1=Math.min(entry.buffer.length,Math.floor(((clip.trimStart||0)+beatToSec(clip.len))*sr));
  const len=s1-s0;if(len<=0){toast('Nothing to bounce');return;}
  const off=new OfflineAudioContext(entry.buffer.numberOfChannels,len,sr);
  const src=off.createBufferSource();src.buffer=entry.buffer;
  if(clip.playbackRate)src.playbackRate.value=clip.playbackRate;
  if(clip.pitchShift)src.detune.value=clip.pitchShift*100;
  const g=off.createGain();g.gain.value=clip.gain||1;
  src.connect(g);g.connect(off.destination);
  src.start(0,clip.trimStart||0,beatToSec(clip.len));
  let rendered;
  try{rendered=await off.startRendering();}catch(e){toast('Bounce failed');return;}
  const id='buf_bounce_'+Date.now();
  Audio_.registerBuffer(id,rendered,clip.label+'_bnc');
  snapshot();clip.bufferId=id;clip.trimStart=0;clip.gain=1;
  delete clip.pitchShift;delete clip.playbackRate;delete clip.fadeIn;delete clip.fadeOut;
  renderTracks();if(S.playing){stopAllScheduled();scheduleClipPlayback();}
  toast('Bounced to new clip');
}

function showInlineEdit(label,def,cb){
  document.getElementById('inline-edit-pop')?.remove();
  const d=document.createElement('div');d.id='inline-edit-pop';
  d.innerHTML=`<div class="iep-lbl">${label}</div>
    <input class="iep-inp" id="iep-inp" type="number" step="any" value="${def}">
    <div class="iep-btns">
      <button class="iep-btn prim" id="iep-ok">Apply</button>
      <button class="iep-btn" onclick="document.getElementById('inline-edit-pop').remove()">Cancel</button>
    </div>`;
  document.body.appendChild(d);
  const inp=document.getElementById('iep-inp');inp.focus();inp.select();
  document.getElementById('iep-ok').onclick=()=>{const v=inp.value;d.remove();cb(v);};
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=inp.value;d.remove();cb(v);}});
}

// Patch scheduler for pitchShift / playbackRate / fadeIn / fadeOut
let _schedPatched=false;
function patchSchedulerForClipOpts(){
  if(_schedPatched)return;_schedPatched=true;
  const orig=window.scheduleClipPlayback;
  window.scheduleClipPlayback=function(){
    stopAllScheduled();if(!S.playing)return;
    Audio_.ensure();const ctxNow=Audio_.ctx.currentTime,nowBeat=secToBeat(S.sec);
    S.tracks.forEach(t=>{
      const gn=Audio_.trackInput(t.id);
      t.clips.forEach(clip=>{
        if(!clip.bufferId||clip.recording)return;
        const entry=S.buffers[clip.bufferId];if(!entry)return;
        const endBeat=clip.start+clip.len;if(endBeat<=nowBeat)return;
        const startBeat=Math.max(clip.start,nowBeat);
        const offsetSec=beatToSec(startBeat-clip.start)+(clip.trimStart||0);
        const whenSec=ctxNow+beatToSec(startBeat-nowBeat);
        const remainSec=Math.max(0.01,beatToSec(endBeat-startBeat));
        const playSec=Math.min(remainSec,Math.max(0,entry.duration-offsetSec));
        if(playSec<=0.005)return;
        const src=Audio_.ctx.createBufferSource();
        src.buffer=clip.reverse?reversedBuffer(entry.buffer):entry.buffer;
        if(clip.playbackRate)src.playbackRate.value=clip.playbackRate;
        if(clip.pitchShift)src.detune.value=clip.pitchShift*100;
        const g=Audio_.ctx.createGain();const bg=clip.gain||1;
        if(clip.fadeIn&&clip.fadeIn>0){const fs=beatToSec(clip.fadeIn);g.gain.setValueAtTime(0,whenSec);g.gain.linearRampToValueAtTime(bg,whenSec+fs);}
        else g.gain.setValueAtTime(bg,whenSec);
        if(clip.fadeOut&&clip.fadeOut>0){const fs=beatToSec(clip.fadeOut),ft=whenSec+playSec-fs;if(ft>whenSec){g.gain.setValueAtTime(bg,ft);g.gain.linearRampToValueAtTime(0,whenSec+playSec);}}
        src.connect(g);g.connect(gn);
        const offset=clip.reverse?Math.max(0,entry.duration-offsetSec-playSec):offsetSec;
        try{src.start(whenSec,offset,playSec);}catch(e){}
        S.scheduled.push(src);
      });
    });
  };
}
patchSchedulerForClipOpts();

/* ════════════════════════════════════════════════════════════
   SAMPLE BROWSER
   Full-featured file browser with:
   · Category sidebar (All, Drums, Loops, One-shots, Samples, Vocals, MIDI, Cloud)
   · Search with live filtering
   · BPM / key metadata display
   · Preview on tap (Web Audio)
   · Drag or "Use" button → drops sample into current track at playhead
   · Recent files history (sessionStorage)
   · File System Access API (showOpenFilePicker) for folder scan
   · Fallback: manual file picker
════════════════════════════════════════════════════════════ */
const SB = {
  items: [],          // [{id,name,path,category,bpm,key,duration,buffer,url}]
  filtered: [],
  query: '',
  category: 'all',
  previewSrc: null,   // active AudioBufferSourceNode
  previewId: null,
  recent: [],
};

const SB_CATS = [
  { id:'all',      icon:'🎵', label:'All files' },
  { id:'drums',    icon:'🥁', label:'Drums' },
  { id:'loops',    icon:'🔁', label:'Loops' },
  { id:'oneshots', icon:'⚡', label:'One-shots' },
  { id:'samples',  icon:'🎤', label:'Samples' },
  { id:'vocals',   icon:'🎙', label:'Vocals' },
  { id:'bass',     icon:'🎸', label:'Bass' },
  { id:'midi',     icon:'🎹', label:'MIDI' },
  { id:'recent',   icon:'🕐', label:'Recent' },
];

function catForFile(name){
  const n=name.toLowerCase();
  if(/drum|kick|snare|hat|clap|808|perc|cymbal/.test(n))return 'drums';
  if(/loop|groove|beat|full/.test(n))return 'loops';
  if(/vocal|vox|voice|rap|adlib|hook/.test(n))return 'vocals';
  if(/bass|sub/.test(n))return 'bass';
  if(/\.mid$/.test(n))return 'midi';
  if(/_[0-9]+bar|_[0-9]+bpm/.test(n))return 'loops';
  return 'oneshots';
}

function guessBpm(name){
  const m=name.match(/(\d{2,3})\s*bpm/i)||name.match(/_(\d{2,3})_/);
  if(m){const v=parseInt(m[1],10);if(v>=40&&v<=240)return v;}
  return null;
}

function guessKey(name){
  const m=name.match(/\b([A-G](?:#|b)?(?:maj|min|m)?)\b/i);
  return m?m[1]:null;
}

function sbAddItem(file, buffer){
  const id='sb_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  const item={
    id, name:file.name,
    category:catForFile(file.name),
    bpm:guessBpm(file.name),
    key:guessKey(file.name),
    duration:buffer?buffer.duration:null,
    buffer,
    url:buffer?null:URL.createObjectURL(file),
    file,
  };
  SB.items.unshift(item);
  // Keep in recent
  SB.recent.unshift({id,name:file.name});
  if(SB.recent.length>20)SB.recent.length=20;
  sbFilter();
  return item;
}

function sbFilter(){
  const q=SB.query.toLowerCase();
  const cat=SB.category;
  SB.filtered=SB.items.filter(it=>{
    if(cat==='recent')return SB.recent.some(r=>r.id===it.id);
    if(cat!=='all'&&it.category!==cat)return false;
    if(q&&!it.name.toLowerCase().includes(q))return false;
    return true;
  });
  renderSbList();
}

function buildBrowser(el){
  el.innerHTML=`<div class="sb-browser">
    <div class="sb-b-top">
      <div class="sb-b-search-wrap">
        <input id="sb-search" class="sb-b-search" type="search" placeholder="Search samples…"
          oninput="SB.query=this.value;sbFilter()">
        <button class="sb-b-import-btn" onclick="sbOpenFiles()" title="Import files">＋ Import</button>
        <button class="sb-b-import-btn" onclick="sbScanFolder()" title="Scan folder" style="opacity:.7;">📁 Folder</button>

          <span>${c.icon}</span><span class="sb-b-cat-lbl">${c.label}</span>

function renderSbList(){
  const list=document.getElementById('sb-b-list');
  if(!list)return;
  const footer=document.getElementById('sb-b-footer');
  if(footer)footer.textContent=`${SB.filtered.length} of ${SB.items.length} files`;
  if(!SB.filtered.length){
    list.innerHTML=`<div class="sb-empty">${SB.items.length?'No matches — try a different search':'Drop audio files here or tap ＋ Import'}</div>`;
    return;
  }
  list.innerHTML=SB.filtered.map(it=>`
    <div class="sb-item-row${SB.previewId===it.id?' sb-previewing':''}" id="sbi-${it.id}"
      onclick="sbPreview('${it.id}')" draggable="true"
      ondragstart="sbDragStart(event,'${it.id}')">
      <div class="sb-item-icon">${it.category==='drums'?'🥁':it.category==='vocals'?'🎙':it.category==='loops'?'🔁':it.category==='bass'?'🎸':it.category==='midi'?'🎹':'⚡'}</div>
      <div class="sb-item-info">
        <div class="sb-item-name">${it.name}</div>
        <div class="sb-item-meta">
          ${it.duration?`<span>${it.duration.toFixed(1)}s</span>`:''}
          ${it.bpm?`<span>${it.bpm} BPM</span>`:''}
          ${it.key?`<span>${it.key}</span>`:''}
          <span style="opacity:.5;text-transform:uppercase;font-size:8px;">${it.category}</span>
        </div>
      </div>
      <div class="sb-item-actions">
        <button class="sb-act-btn" onclick="event.stopPropagation();sbPreview('${it.id}')" title="Preview">
          ${SB.previewId===it.id?'■':'▶'}

  // Wire drag from list items
  list.querySelectorAll('.sb-item-row').forEach(row=>{

    row.addEventListener('dragstart',e=>sbDragStart(e,id));
  });

function sbSetCat(cat,btn){
  SB.category=cat;
  document.querySelectorAll('.sb-b-cat').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  sbFilter();
}

async function sbPreview(id){
  // Stop any current preview
  if(SB.previewSrc){try{SB.previewSrc.stop();}catch(e){}SB.previewSrc=null;}
  if(SB.previewId===id){SB.previewId=null;renderSbList();return;}

  const item=SB.items.find(i=>i.id===id);
  if(!item)return;
  SB.previewId=id;
  renderSbList();

  Audio_.ensure();
  let buffer=item.buffer;
  if(!buffer&&item.file){
    try{
      const ab=await item.file.arrayBuffer();
      buffer=await Audio_.ctx.decodeAudioData(ab);
      item.buffer=buffer;
      item.duration=buffer.duration;
    }catch(e){toast('Cannot preview this file');SB.previewId=null;renderSbList();return;}
  }
  if(!buffer){toast('No audio data');SB.previewId=null;renderSbList();return;}

  const g=Audio_.ctx.createGain();g.gain.value=0.85;
  g.connect(Audio_.master);
  const src=Audio_.ctx.createBufferSource();
  src.buffer=buffer;src.connect(g);
  src.start(0);
  SB.previewSrc=src;
  src.onended=()=>{if(SB.previewId===id){SB.previewId=null;renderSbList();}};
}

async function sbUseItem(id){
  const item=SB.items.find(i=>i.id===id);
  if(!item)return;
  if(!S.tracks.length){toast('Add a track first');return;}

  Audio_.ensure();
  let buffer=item.buffer;
  if(!buffer&&item.file){
    try{
      const ab=await item.file.arrayBuffer();
      buffer=await Audio_.ctx.decodeAudioData(ab);
      item.buffer=buffer;item.duration=buffer.duration;
    }catch(e){toast('Cannot decode file');return;}
  }
  if(!buffer){toast('No audio data');return;}

  const bufId='sb_buf_'+id;
  Audio_.registerBuffer(bufId,buffer,item.name);

  const ti=S.activeTrack<S.tracks.length?S.activeTrack:0;
  const t=S.tracks[ti];
  const dropBeat=Math.max(0,Math.round(secToBeat(S.sec)));
  const lenBeats=Math.max(0.25,secToBeat(buffer.duration));
  snapshot();
  t.clips.push({id:'clip_'+Date.now(),start:dropBeat,len:lenBeats,label:item.name.replace(/\.[^.]+$/,''),bufferId:bufId});
  renderTracks();
  if(S.playing){stopAllScheduled();scheduleClipPlayback();}
  toast(`Added "${item.name}" → Track ${ti+1}`);
}

function sbDragStart(e,id){
  e.dataTransfer.setData('text/plain',id);
  e.dataTransfer.effectAllowed='copy';
}

// Wire clip lanes to accept drags from browser
(function wireSbLaneDrop(){
  // We patch setupLaneFileDrop to also accept sb item IDs
  const _orig=window.setupLaneFileDrop;
  window.setupLaneFileDrop=function(lane,t,ti){
    _orig(lane,t,ti);
    lane.addEventListener('dragover',e=>{if(e.dataTransfer.types.includes('text/plain'))e.preventDefault();});
    lane.addEventListener('drop',async e=>{
      const sbId=e.dataTransfer.getData('text/plain');
      if(!sbId||!sbId.startsWith('sb_'))return;
      e.preventDefault();e.stopPropagation();
      const item=SB.items.find(i=>i.id===sbId);if(!item)return;
      const rect=lane.getBoundingClientRect();
      const dropBeat=Math.max(0,Math.floor(xToBeat(e.clientX-rect.left)));
      Audio_.ensure();
      let buffer=item.buffer;
      if(!buffer&&item.file){
        try{const ab=await item.file.arrayBuffer();buffer=await Audio_.ctx.decodeAudioData(ab);item.buffer=buffer;item.duration=buffer.duration;}
        catch(ex){toast('Cannot decode');return;}
      }
      if(!buffer)return;
      const bufId='sb_buf_'+item.id;
      Audio_.registerBuffer(bufId,buffer,item.name);
      const lenBeats=Math.max(0.25,secToBeat(buffer.duration));
      snapshot();
      t.clips.push({id:'clip_'+Date.now(),start:dropBeat,len:lenBeats,label:item.name.replace(/\.[^.]+$/,''),bufferId:bufId});
      renderTracks();
      if(S.playing){stopAllScheduled();scheduleClipPlayback();}
      toast(`Dropped "${item.name}" at bar ${Math.floor(dropBeat/4)+1}`);
    });
  };
})();

async function sbOpenFiles(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='audio/*,.mid,.midi';inp.multiple=true;inp.style.display='none';
  document.body.appendChild(inp);
  inp.onchange=async()=>{
    const files=[...inp.files];inp.remove();
    toast(`Loading ${files.length} file(s)…`);
    let ok=0;
    for(const f of files){
      try{
        if(f.name.match(/\.midi?$/)){sbAddItem(f,null);ok++;continue;}
        const ab=await f.arrayBuffer();
        Audio_.ensure();
        const buf=await Audio_.ctx.decodeAudioData(ab);
        sbAddItem(f,buf);ok++;
      }catch(e){toast('Skipped: '+f.name);}
    }
    toast(`${ok} file(s) imported`);
    const el=document.getElementById('dp-browser');
    if(el&&el.classList.contains('active'))buildBrowser(el);
  };
  inp.click();
}

async function sbScanFolder(){
  if(!window.showDirectoryPicker){
    toast('Folder scan needs Chrome/Edge. Use ＋ Import instead.');
    return sbOpenFiles();
  }
  try{
    const dir=await window.showDirectoryPicker();
    toast('Scanning folder…');
    let count=0;
    async function scanDir(d){
      for await(const [name,entry] of d.entries()){
        if(entry.kind==='directory')await scanDir(entry);
        else if(/\.(wav|mp3|aiff|flac|ogg|m4a|aac|mid|midi)$/i.test(name)){
          try{
            const file=await entry.getFile();
            if(name.match(/\.midi?$/)){sbAddItem(file,null);count++;continue;}
            const ab=await file.arrayBuffer();
            Audio_.ensure();
            const buf=await Audio_.ctx.decodeAudioData(ab);
            sbAddItem(file,buf);count++;
            if(count%10===0)toast(`${count} files loaded…`);
          }catch(e){}
        }
      }
    }
    await scanDir(dir);
    toast(`Imported ${count} file(s) from folder`);
    const el=document.getElementById('dp-browser');
    if(el&&el.classList.contains('active'))buildBrowser(el);
  }catch(e){if(e.name!=='AbortError')toast('Folder scan failed');}
}

// Also hook the sampler waveform drop zone → add to browser too
(function patchSamplerForBrowser(){
  const _origSampDrop=window.setupSamplerDrop;
  window.setupSamplerDrop=function(){
    _origSampDrop&&_origSampDrop();
    const zone=document.getElementById('samp-drop');
    if(!zone||zone._sbHooked)return;
    zone._sbHooked=true;
    zone.addEventListener('drop',async e=>{
      const files=[...((e.dataTransfer&&e.dataTransfer.files)||[])];
      for(const f of files){
        if(!/\.(wav|mp3|aiff|flac|ogg|m4a|aac)$/i.test(f.name))continue;
        try{
          const ab=await f.arrayBuffer();Audio_.ensure();
          const buf=await Audio_.ctx.decodeAudioData(ab);
          sbAddItem(f,buf);
        }catch(e){}
      }
    },{passive:false,capture:false});
  };
})();
