name: Patch Studio index

on:
  push:
    branches:
      - fix/studio-index-direct-shell
    paths:
      - .github/workflows/patch-studio-index.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/studio-index-direct-shell
      - name: Build direct Studio shell
        run: |
          cp app/index.html studio/index.html
          python3 - <<'PY'
          from pathlib import Path
          p = Path('studio/index.html')
          text = p.read_text(encoding='utf-8').replace('\u00a0', ' ')
          text = text.replace('<head>\n', '<head>\n<base href="../app/">\n', 1)
          marker = '<link rel="stylesheet" href="css/32-nw-menubar.css">'
          mobile = marker + '\n<link rel="stylesheet" href="css/33-mobile-usable.css?v=2">'
          if '33-mobile-usable.css' not in text:
              if marker not in text:
                  raise SystemExit('Expected stylesheet marker missing')
              text = text.replace(marker, mobile, 1)
          p.write_text(text, encoding='utf-8')
          PY
      - name: Commit Studio index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add studio/index.html
          git commit -m "Replace Studio index with direct full-screen shell"
          git push origin HEAD:fix/studio-index-direct-shell
