name: Final mobile and Pages repair
on:
  push:
    branches: [fix/mobile-pages-agent-suite]
    paths: [.github/workflows/final-mobile-repair.yml]
permissions:
  contents: write
jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mobile-pages-agent-suite
      - name: Patch public pages
        run: |
          python3 - <<'PY'
          from pathlib import Path

          root = Path('index.html')
          text = root.read_text(encoding='utf-8')
          marker = '<link rel="stylesheet" href="./css/62-mobile-hotfix.css?v=2">'
          final = marker + '\n  <link rel="stylesheet" href="./css/63-mobile-final.css?v=1">'
          if '63-mobile-final.css' not in text:
              if marker not in text:
                  raise SystemExit('mobile stylesheet marker missing')
              text = text.replace(marker, final, 1)
          root.write_text(text, encoding='utf-8')

          for name in ('live-loop','wave-loom','studio'):
              page = Path(name) / 'home' / 'index.html'
              html = page.read_text(encoding='utf-8')
              html = html.replace('href="../../product-home.css"', 'href="/NeusicLabV1/product-home.css?v=3"')
              page.write_text(html, encoding='utf-8')

          source = Path('suite/index.html').read_text(encoding='utf-8')
          source = source.replace('href="../app/', 'href="./app/')
          source = source.replace("src: '../live-loop/", "src: './live-loop/")
          source = source.replace("src: '../wave-loom/", "src: './wave-loom/")
          source = source.replace("src: '../studio/", "src: './studio/")
          source = source.replace('href="../">‹ Hub', 'href="./">‹ Hub')
          Path('suite.html').write_text(source, encoding='utf-8')

          Path('.github/workflows/final-mobile-repair.yml').unlink()
          PY
      - name: Commit repaired public pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix mobile landing visibility, product CSS, and suite fallback"
          git push origin HEAD:fix/mobile-pages-agent-suite
