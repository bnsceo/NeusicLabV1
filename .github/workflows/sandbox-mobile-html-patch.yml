name: Sandbox mobile HTML patch

on:
  push:
    branches:
      - sandbox/landing-mobile-responsiveness
    paths:
      - .github/workflows/sandbox-mobile-html-patch.yml

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sandbox/landing-mobile-responsiveness
      - name: Patch landing HTML directly
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          old = '<link rel="stylesheet" href="./css/61-landing-reskin.css?v=1">'
          new = '<link rel="stylesheet" href="./css/61-landing-reskin.css?v=2">\n  <link rel="stylesheet" href="./css/62-mobile-hotfix.css?v=2">'
          if './css/62-mobile-hotfix.css?v=2' not in text:
              if old not in text:
                  raise SystemExit('Expected landing stylesheet marker not found')
              text = text.replace(old, new, 1)
          replacements = {
              './suite/?suite=live': './live-loop/',
              './suite/?suite=wave': './wave-loom/',
              './suite/?suite=studio': './studio/',
          }
          for source, target in replacements.items():
              text = text.replace(source, target)
          if 'suite/?suite=' in text:
              raise SystemExit('A suite wrapper link remains in index.html')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit exact landing patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Load mobile CSS directly and fix landing links"
          git push origin HEAD:sandbox/landing-mobile-responsiveness
