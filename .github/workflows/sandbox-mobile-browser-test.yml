name: Sandbox mobile browser test

on:
  push:
    branches:
      - sandbox/landing-mobile-responsiveness
    paths:
      - .github/workflows/sandbox-mobile-browser-test.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/sandbox-mobile-browser-test.yml

permissions:
  contents: write

jobs:
  responsive-browser-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sandbox/landing-mobile-responsiveness
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install browser test runtime
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.54.1 >/dev/null
          npx playwright install --with-deps chromium >/dev/null
      - name: Run real viewport tests and save report
        id: browser_test
        continue-on-error: true
        run: |
          python3 -m http.server 4173 >/tmp/neusic-http.log 2>&1 &
          cat > /tmp/mobile-test.cjs <<'JS'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const viewports = [
            { name: '320x568', width: 320, height: 568 },
            { name: '375x667', width: 375, height: 667 },
            { name: '390x844', width: 390, height: 844 },
            { name: '430x932', width: 430, height: 932 },
            { name: '844x390-landscape', width: 844, height: 390 },
          ];
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const results = [];
            let passed = true;
            for (const vp of viewports) {
              const page = await browser.newPage({ viewport: { width: vp.width, height: vp.height }, deviceScaleFactor: 1 });
              const pageErrors = [];
              page.on('pageerror', error => pageErrors.push(error.message));
              await page.goto('http://127.0.0.1:4173/', { waitUntil: 'domcontentloaded' });
              await page.waitForTimeout(700);
              const result = await page.evaluate(() => {
                const hero = document.querySelector('.hero');
                const title = document.querySelector('#heroTitle');
                const menu = document.querySelector('#menuButton');
                const cards = [...document.querySelectorAll('.journey-step')];
                const links = [...document.querySelectorAll('a[href]')].map(a => a.getAttribute('href'));
                const rect = title?.getBoundingClientRect();
                return {
                  innerWidth,
                  scrollWidth: document.documentElement.scrollWidth,
                  bodyScrollWidth: document.body.scrollWidth,
                  heroVisible: !!hero && hero.getBoundingClientRect().height > 100,
                  titleVisible: !!rect && rect.width > 0 && rect.height > 0,
                  menuVisible: !!menu && getComputedStyle(menu).display !== 'none',
                  cardsFit: cards.every(card => card.getBoundingClientRect().width <= innerWidth + 1),
                  hasDirectMobileCss: !!document.querySelector('link[href*="62-mobile-hotfix.css"]'),
                  hasSuiteWrapperLink: links.some(href => href && href.includes('suite/?suite=')),
                  directApps: ['./live-loop/','./wave-loom/','./studio/'].every(href => links.includes(href)),
                };
              });
              const checks = {
                documentFits: result.scrollWidth <= vp.width + 1,
                bodyFits: result.bodyScrollWidth <= vp.width + 1,
                heroVisible: result.heroVisible,
                titleVisible: result.titleVisible,
                cardsFit: result.cardsFit,
                directMobileCss: result.hasDirectMobileCss,
                noSuiteWrapperLinks: !result.hasSuiteWrapperLink,
                directAppLinks: result.directApps,
              };
              if (vp.width <= 430) {
                checks.menuVisible = result.menuVisible;
                if (result.menuVisible) {
                  await page.click('#menuButton');
                  checks.menuOpens = await page.locator('#mobileMenu').evaluate(el => el.classList.contains('open'));
                  await page.click('#menuButton');
                  checks.menuCloses = !(await page.locator('#mobileMenu').evaluate(el => el.classList.contains('open')));
                } else {
                  checks.menuOpens = false;
                  checks.menuCloses = false;
                }
              }
              const viewportPassed = Object.values(checks).every(Boolean);
              passed = passed && viewportPassed;
              results.push({ viewport: vp.name, passed: viewportPassed, checks, measurements: result, pageErrors });
              await page.close();
            }
            await browser.close();
            const report = { passed, testedAt: new Date().toISOString(), results };
            fs.writeFileSync('responsive-test-report.json', JSON.stringify(report, null, 2) + '\n');
            console.log(JSON.stringify(report, null, 2));
            if (!passed) process.exitCode = 1;
          })().catch(error => {
            fs.writeFileSync('responsive-test-report.json', JSON.stringify({ passed:false, fatal:error.stack || String(error) }, null, 2) + '\n');
            console.error(error);
            process.exit(1);
          });
          JS
          node /tmp/mobile-test.cjs
      - name: Commit browser report to sandbox
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add responsive-test-report.json
          git diff --cached --quiet || git commit -m "Record sandbox mobile browser test"
          git push origin HEAD:sandbox/landing-mobile-responsiveness
      - name: Enforce browser result
        if: steps.browser_test.outcome != 'success'
        run: exit 1
