name: Sandbox mobile browser test

on:
  push:
    branches:
      - sandbox/landing-mobile-responsiveness
    paths:
      - .github/workflows/sandbox-mobile-browser-test.yml
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  responsive-browser-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: sandbox/landing-mobile-responsiveness
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install browser test runtime
        run: |
          npm init -y >/dev/null 2>&1
          npm install playwright@1.54.1 >/dev/null
          npx playwright install --with-deps chromium >/dev/null
      - name: Run real viewport tests
        run: |
          python3 -m http.server 4173 >/tmp/neusic-http.log 2>&1 &
          cat > /tmp/mobile-test.cjs <<'JS'
          const { chromium } = require('playwright');
          const assert = require('assert');
          const viewports = [
            { name: '320x568', width: 320, height: 568 },
            { name: '375x667', width: 375, height: 667 },
            { name: '390x844', width: 390, height: 844 },
            { name: '430x932', width: 430, height: 932 },
            { name: '844x390-landscape', width: 844, height: 390 },
          ];
          (async () => {
            const browser = await chromium.launch({ headless: true });
            const results = [];
            for (const vp of viewports) {
              const page = await browser.newPage({ viewport: { width: vp.width, height: vp.height }, deviceScaleFactor: 1 });
              const errors = [];
              page.on('pageerror', error => errors.push(error.message));
              await page.goto('http://127.0.0.1:4173/', { waitUntil: 'domcontentloaded' });
              await page.waitForTimeout(700);
              const result = await page.evaluate(() => {
                const hero = document.querySelector('.hero');
                const title = document.querySelector('#heroTitle');
                const menu = document.querySelector('#menuButton');
                const cards = [...document.querySelectorAll('.journey-step')];
                const links = [...document.querySelectorAll('a[href]')].map(a => a.getAttribute('href'));
                const rect = title?.getBoundingClientRect();
                return {
                  innerWidth,
                  scrollWidth: document.documentElement.scrollWidth,
                  bodyScrollWidth: document.body.scrollWidth,
                  heroVisible: !!hero && hero.getBoundingClientRect().height > 100,
                  titleVisible: !!rect && rect.width > 0 && rect.height > 0,
                  menuVisible: !!menu && getComputedStyle(menu).display !== 'none',
                  cardsFit: cards.every(card => card.getBoundingClientRect().width <= innerWidth + 1),
                  hasDirectMobileCss: !!document.querySelector('link[href*="62-mobile-hotfix.css"]'),
                  hasSuiteWrapperLink: links.some(href => href && href.includes('suite/?suite=')),
                  directApps: ['./live-loop/','./wave-loom/','./studio/'].every(href => links.includes(href)),
                };
              });
              assert(result.scrollWidth <= vp.width + 1, `${vp.name}: document horizontal overflow ${result.scrollWidth} > ${vp.width}`);
              assert(result.bodyScrollWidth <= vp.width + 1, `${vp.name}: body horizontal overflow ${result.bodyScrollWidth} > ${vp.width}`);
              assert(result.heroVisible, `${vp.name}: hero not visible`);
              assert(result.titleVisible, `${vp.name}: title not visible`);
              assert(result.cardsFit, `${vp.name}: journey card exceeds viewport`);
              assert(result.hasDirectMobileCss, `${vp.name}: mobile CSS not linked directly`);
              assert(!result.hasSuiteWrapperLink, `${vp.name}: suite wrapper link remains`);
              assert(result.directApps, `${vp.name}: direct app links missing`);
              if (vp.width <= 430) {
                assert(result.menuVisible, `${vp.name}: mobile menu button hidden`);
                await page.click('#menuButton');
                assert(await page.locator('#mobileMenu').evaluate(el => el.classList.contains('open')), `${vp.name}: mobile menu did not open`);
                await page.click('#menuButton');
                assert(!(await page.locator('#mobileMenu').evaluate(el => el.classList.contains('open'))), `${vp.name}: mobile menu did not close`);
              }
              results.push({ viewport: vp.name, ...result, pageErrors: errors });
              await page.close();
            }
            await browser.close();
            console.log(JSON.stringify({ passed: true, results }, null, 2));
          })().catch(error => { console.error(error); process.exit(1); });
          JS
          node /tmp/mobile-test.cjs
