name: Deploy Neusic Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: neusic-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare production site
        run: |
          rm -rf _site
          mkdir -p _site/studio _site/wave-loom _site/live-loop _site/social _site/suite
          mkdir -p _site/waveform _site/livestudio _site/css _site/app/css _site/app/js
          mkdir -p _site/scripts/landing _site/scripts/shared _site/assets/icons

          cp index.html _site/index.html
          cp suite.html _site/suite.html
          cp favicon.ico _site/favicon.ico
          cp favicon-16x16.png _site/favicon-16x16.png
          cp favicon-32x32.png _site/favicon-32x32.png
          cp favicon-48x48.png _site/favicon-48x48.png
          cp favicon-180x180.png _site/favicon-180x180.png
          cp favicon-192x192.png _site/favicon-192x192.png
          cp favicon-512x512.png _site/favicon-512x512.png
          cp apple-touch-icon.png _site/apple-touch-icon.png
          cp site.webmanifest _site/site.webmanifest

          cp -R css/. _site/css/
          cp -R scripts/landing/. _site/scripts/landing/
          cp -R scripts/shared/. _site/scripts/shared/
          cp -R assets/icons/. _site/assets/icons/

          cp -R waveform/. _site/waveform/
          cp -R livestudio/. _site/livestudio/
          cp -R suite/. _site/suite/

          # Shared NW modules referenced as ../app/… by waveform/ and livestudio/.
          # app/ itself deploys as /studio/, so these receive dedicated copies.
          cp app/css/30-nw-tokens.css _site/app/css/30-nw-tokens.css
          cp app/css/32-nw-menubar.css _site/app/css/32-nw-menubar.css
          cp app/js/44-nw-agent.js _site/app/js/44-nw-agent.js
          cp app/js/45-nw-demo-gate.js _site/app/js/45-nw-demo-gate.js

          cp -R social/. _site/social/
          cp -R app/. _site/studio/
          cp -R wave-loom/. _site/wave-loom/
          cp -R live-loop/. _site/live-loop/

          mv _site/studio/index.html _site/studio/core.html
          mv _site/studio/phase-a.html _site/studio/index.html
          python3 scripts/build_pages.py _site

          # Keep the public root as the exact teaser-only launch page. The
          # metadata builder still prepares cards and product-page metadata.
          cp index.html _site/index.html

          touch _site/.nojekyll
          touch _site/studio/.nojekyll
          touch _site/wave-loom/.nojekyll
          touch _site/live-loop/.nojekyll
          touch _site/suite/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
