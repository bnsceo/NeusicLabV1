name: Deploy Neusic Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: neusic-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare production site
        run: |
          rm -rf _site
          mkdir -p _site/studio _site/wave-loom _site/live-loop _site/social
          cp index.html _site/index.html
          cp site-polish.css _site/site-polish.css
          cp site-polish.js _site/site-polish.js
          cp landing-experience.css _site/landing-experience.css
          cp landing-experience.js _site/landing-experience.js
          cp neusic-suite.css _site/neusic-suite.css
          cp neusic-suite.js _site/neusic-suite.js
          cp neusic-agent.css _site/neusic-agent.css
          cp neusic-agent.js _site/neusic-agent.js
          cp -R social/. _site/social/
          cp -R app/. _site/studio/
          cp -R wave-loom/. _site/wave-loom/
          cp -R live-loop/. _site/live-loop/
          mv _site/studio/index.html _site/studio/core.html
          mv _site/studio/phase-a.html _site/studio/index.html
          python - <<'PY'
          from pathlib import Path
          import re

          creator_style = '''<style id="neusic-creator-credit-style">
          :root{--neusic-credit-safe:14px;--neusic-credit-primary:#d4a354;--neusic-credit-secondary:#f0c77d;--neusic-credit-tertiary:#68d8ff}
          .neusic-creator-credit{position:fixed;z-index:100000;max-width:calc(100vw - 16px);padding:3px 7px;pointer-events:none;border:1px solid color-mix(in srgb,var(--neusic-credit-primary) 30%,transparent);background:rgba(2,7,10,.9);font:700 6px/1 "JetBrains Mono",ui-monospace,monospace;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.42),inset 0 0 12px color-mix(in srgb,var(--neusic-credit-primary) 8%,transparent);isolation:isolate}
          .neusic-creator-credit span{display:block;color:transparent;background:linear-gradient(90deg,var(--neusic-credit-primary),var(--neusic-credit-secondary),var(--neusic-credit-tertiary),var(--neusic-credit-secondary),var(--neusic-credit-primary));background-size:320% 100%;background-position:0 50%;-webkit-background-clip:text;background-clip:text;filter:drop-shadow(0 0 3px color-mix(in srgb,var(--neusic-credit-primary) 65%,transparent));animation:neusic-credit-flow 5.2s linear infinite,neusic-credit-pulse 2.6s ease-in-out infinite alternate}
          .neusic-creator-top{top:0;left:0;border-width:0 1px 1px 0;border-radius:0 0 5px 0}.neusic-creator-bottom{right:0;bottom:0;border-width:1px 0 0 1px;border-radius:5px 0 0 0}
          @keyframes neusic-credit-flow{to{background-position:320% 50%}}@keyframes neusic-credit-pulse{from{opacity:.76;filter:drop-shadow(0 0 2px var(--neusic-credit-primary))}to{opacity:1;filter:drop-shadow(0 0 6px var(--neusic-credit-secondary))}}
          body>.neusic-creator-top~#boot{inset:var(--neusic-credit-safe) 0!important}
          body>.neusic-creator-top~iframe#studio{height:calc(100dvh - (var(--neusic-credit-safe) * 2))!important;margin-top:var(--neusic-credit-safe)!important;margin-bottom:var(--neusic-credit-safe)!important}
          body>.neusic-creator-top~#app{height:calc(100dvh - (var(--neusic-credit-safe) * 2))!important;max-height:calc(100dvh - (var(--neusic-credit-safe) * 2))!important;margin-top:var(--neusic-credit-safe)!important;margin-bottom:var(--neusic-credit-safe)!important}
          body>.neusic-creator-top~.topbar{top:var(--neusic-credit-safe)!important}
          body>.neusic-creator-top~.workspace{padding-bottom:calc(8px + var(--neusic-credit-safe))!important}
          body>.neusic-creator-top~.performance-shell{padding-top:calc(28px + var(--neusic-credit-safe))!important;padding-bottom:calc(40px + var(--neusic-credit-safe))!important}
          body>.neusic-creator-bottom~#app #mobile-nav,body>.neusic-creator-bottom~#app .neusic-mobile-nav,body>.neusic-creator-bottom~.wave-mobile-dock,body>.neusic-creator-bottom~#studio-v4-mobile-nav{bottom:var(--neusic-credit-safe)!important}
          @media(max-width:580px){.neusic-creator-credit{font-size:5px;letter-spacing:.08em;padding:2px 5px}:root{--neusic-credit-safe:11px}}
          @media(prefers-reduced-motion:reduce){.neusic-creator-credit span{animation:none;background-position:50% 50%}}
          </style>'''
          creator_markup = '<div class="neusic-creator-credit neusic-creator-top" data-neusic-creator><span>Made by Anderson Paulino</span></div><div class="neusic-creator-credit neusic-creator-bottom" data-neusic-creator><span>Made by Anderson Paulino</span></div>'
          creator_script = '''<script id="neusic-creator-credit-script">
          (()=>{const root=document.documentElement,store="neusic-theme-v1";let last="";
          const hex=v=>{const m=String(v||"").trim().match(/^#([0-9a-f]{3}|[0-9a-f]{6})$/i);if(!m)return null;let s=m[1];if(s.length===3)s=[...s].map(x=>x+x).join("");return "#"+s.toLowerCase()};
          const hsl=(value,turn=0,light=0)=>{const v=hex(value);if(!v)return null;let r=parseInt(v.slice(1,3),16)/255,g=parseInt(v.slice(3,5),16)/255,b=parseInt(v.slice(5,7),16)/255,max=Math.max(r,g,b),min=Math.min(r,g,b),h=0,s=0,l=(max+min)/2,d=max-min;if(d){s=d/(1-Math.abs(2*l-1));if(max===r)h=60*(((g-b)/d)%6);else if(max===g)h=60*((b-r)/d+2);else h=60*((r-g)/d+4)}h=(h+turn+360)%360;l=Math.max(.2,Math.min(.82,l+light));const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;let a=0,q=0,z=0;if(h<60){a=c;q=x}else if(h<120){a=x;q=c}else if(h<180){q=c;z=x}else if(h<240){q=x;z=c}else if(h<300){a=x;z=c}else{a=c;z=x}return "#"+[a,q,z].map(n=>Math.round((n+m)*255).toString(16).padStart(2,"0")).join("")};
          const css=()=>getComputedStyle(root),pick=()=>{let saved={};try{saved=JSON.parse(localStorage.getItem(store)||"{}")}catch(_){}const c=css(),read=n=>hex(c.getPropertyValue(n));const primary=hex(saved.accent)||read("--studio-accent")||read("--acc")||read("--accent")||read("--cyan")||"#d4a354";const secondary=hex(saved.bright)||read("--studio-accent-bright")||read("--accent-bright")||hsl(primary,18,.16)||primary;const tertiary=hsl(primary,118,.08)||"#68d8ff";return[primary,secondary,tertiary]};
          const apply=()=>{const colors=pick(),key=colors.join("|");if(key===last)return;last=key;root.style.setProperty("--neusic-credit-primary",colors[0]);root.style.setProperty("--neusic-credit-secondary",colors[1]);root.style.setProperty("--neusic-credit-tertiary",colors[2])};apply();addEventListener("storage",apply);setInterval(apply,1000)})();
          </script>'''

          def upsert_tag(html: str, pattern: str, tag: str) -> str:
              if re.search(pattern, html, flags=re.I | re.S):
                  return re.sub(pattern, tag, html, count=1, flags=re.I | re.S)
              return html.replace('</head>', f'  {tag}\n</head>', 1)

          def set_meta(html: str, attribute: str, key: str, value: str) -> str:
              tag = f'<meta {attribute}="{key}" content="{value}">'
              pattern = rf'<meta\b[^>]*\b{attribute}=["\']{re.escape(key)}["\'][^>]*>'
              return upsert_tag(html, pattern, tag)

          def set_preview(path: Path, *, title: str, description: str, url: str, image: str, image_type: str = 'image/svg+xml') -> None:
              html = path.read_text()
              html = upsert_tag(html, r'<title\b[^>]*>.*?</title>', f'<title>{title}</title>')
              html = upsert_tag(html, r'<link\b[^>]*\brel=["\']canonical["\'][^>]*>', f'<link rel="canonical" href="{url}">')
              html = set_meta(html, 'name', 'description', description)
              html = set_meta(html, 'property', 'og:type', 'website')
              html = set_meta(html, 'property', 'og:site_name', 'Neusic')
              html = set_meta(html, 'property', 'og:title', title)
              html = set_meta(html, 'property', 'og:description', description)
              html = set_meta(html, 'property', 'og:url', url)
              html = set_meta(html, 'property', 'og:image', image)
              html = set_meta(html, 'property', 'og:image:type', image_type)
              html = set_meta(html, 'property', 'og:image:width', '1200')
              html = set_meta(html, 'property', 'og:image:height', '630')
              html = set_meta(html, 'property', 'og:image:alt', f'{title} link preview')
              html = set_meta(html, 'name', 'twitter:card', 'summary_large_image')
              html = set_meta(html, 'name', 'twitter:title', title)
              html = set_meta(html, 'name', 'twitter:description', description)
              html = set_meta(html, 'name', 'twitter:image', image)
              html = set_meta(html, 'name', 'twitter:image:alt', f'{title} link preview')
              path.write_text(html)

          previews = {
              Path('_site/index.html'): {
                  'title': 'Neusic — Live Loop, Wave & Lab',
                  'description': 'Three connected music apps: capture synchronized loops, transform sound, and finish the record in one creative workflow.',
                  'url': 'https://bnsceo.github.io/NeusicLabV1/',
                  'image': 'https://bnsceo.github.io/NeusicLabV1/social/neusic-suite-card.svg',
              },
              Path('_site/live-loop/index.html'): {
                  'title': 'Neusic Live Loop — Synchronized Mobile Looping',
                  'description': 'Record voice, rhythm, harmony, instruments, and samples across five synchronized touch-first loop lanes. MIDI is optional.',
                  'url': 'https://bnsceo.github.io/NeusicLabV1/live-loop/',
                  'image': 'https://bnsceo.github.io/NeusicLabV1/social/live-loop-card.svg',
              },
              Path('_site/wave-loom/index.html'): {
                  'title': 'Neusic Wave — Sample Performance & Sound Design',
                  'description': 'Record or upload sound, trim and slice it in The Forge, perform it through Wave, Sample, Granular, or Hybrid engines, and send it to Lab.',
                  'url': 'https://bnsceo.github.io/NeusicLabV1/wave-loom/',
                  'image': 'https://bnsceo.github.io/NeusicLabV1/social/wave-card.svg',
              },
              Path('_site/studio/index.html'): {
                  'title': 'Neusic Lab — Music Production Workspace',
                  'description': 'Arrange, record, edit, mix, master, recover, and export a connected Neusic project with a persistent track sidebar and dedicated workspace.',
                  'url': 'https://bnsceo.github.io/NeusicLabV1/studio/',
                  'image': 'https://bnsceo.github.io/NeusicLabV1/social/lab-card.svg',
              },
          }
          for page, data in previews.items():
              set_preview(page, **data)

          landing = Path('_site/index.html')
          html = landing.read_text()
          html = re.sub(r'\s*<nav\b[^>]*class=["\']desktop-nav["\'][^>]*>.*?</nav>', '', html, flags=re.I | re.S)
          html = re.sub(r'\s*<button\b[^>]*id=["\']menuButton["\'][^>]*>.*?</button>', '', html, flags=re.I | re.S)
          html = re.sub(r'\s*<nav\b[^>]*id=["\']mobileMenu["\'][^>]*>.*?</nav>', '', html, flags=re.I | re.S)
          if 'site-polish.css' not in html:
              html = html.replace('</head>', '<link rel="stylesheet" href="./site-polish.css?v=9"></head>', 1)
          if 'site-polish.js' not in html:
              html = html.replace('</body>', '<script src="./site-polish.js?v=9"></script></body>', 1)
          landing.write_text(html)

          for page in Path('_site').rglob('*.html'):
              html = page.read_text()
              if 'data-neusic-creator' not in html:
                  if '</head>' in html:
                      html = html.replace('</head>', creator_style + '</head>', 1)
                  body_at = html.find('<body')
                  if body_at >= 0:
                      body_end = html.find('>', body_at)
                      if body_end >= 0:
                          html = html[:body_end + 1] + creator_markup + html[body_end + 1:]
                  html = html.replace('</body>', creator_script + '</body>', 1)
              page.write_text(html)
          PY
          touch _site/.nojekyll
          touch _site/studio/.nojekyll
          touch _site/wave-loom/.nojekyll
          touch _site/live-loop/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
