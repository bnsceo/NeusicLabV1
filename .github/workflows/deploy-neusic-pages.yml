name: Deploy Neusic Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: neusic-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare production site
        run: |
          rm -rf _site
          mkdir -p _site/studio _site/wave-loom _site/live-loop _site/social
          mkdir -p _site/waveform _site/livestudio _site/css _site/app/css _site/app/js
          cp index.html _site/index.html
          cp css/60-hub-landing.css _site/css/60-hub-landing.css
          cp -R waveform/. _site/waveform/
          cp -R livestudio/. _site/livestudio/
          # shared NW modules referenced as ../app/… by waveform/ and livestudio/
          # (app/ itself deploys as /studio/, so these need their own copies)
          cp app/css/30-nw-tokens.css _site/app/css/30-nw-tokens.css
          cp app/css/32-nw-menubar.css _site/app/css/32-nw-menubar.css
          cp app/js/44-nw-agent.js _site/app/js/44-nw-agent.js
          cp app/js/45-nw-demo-gate.js _site/app/js/45-nw-demo-gate.js
          cp site-polish.css _site/site-polish.css
          cp site-polish.js _site/site-polish.js
          cp landing-experience.css _site/landing-experience.css
          cp landing-experience.js _site/landing-experience.js
          cp neusic-suite.css _site/neusic-suite.css
          cp neusic-suite.js _site/neusic-suite.js
          cp neusic-agent.css _site/neusic-agent.css
          cp neusic-agent.js _site/neusic-agent.js
          cp -R social/. _site/social/
          cp -R app/. _site/studio/
          cp -R wave-loom/. _site/wave-loom/
          cp -R live-loop/. _site/live-loop/
          mv _site/studio/index.html _site/studio/core.html
          mv _site/studio/phase-a.html _site/studio/index.html
          python3 scripts/build_pages.py _site
          touch _site/.nojekyll
          touch _site/studio/.nojekyll
          touch _site/wave-loom/.nojekyll
          touch _site/live-loop/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
