<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#0b0d0f">
  <title>Neusic Studio</title>
  <style>
    @import url('https://api.fontshare.com/v2/css?f[]=clash-display@500,600,700&f[]=satoshi@400,500,600,700&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap');
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#0b0d0f;font-family:"Satoshi","Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #boot{position:fixed;inset:0;z-index:2;display:grid;place-items:center;color:#e8ebee;background:radial-gradient(circle at 50% 28%,#1c2024,#0b0d0f 58%)}
    .boot-card{width:min(310px,78vw);text-align:center}.logo{font:650 30px/1 "Clash Display","Manrope",sans-serif;letter-spacing:.08em;text-transform:uppercase}.logo span{color:#d4a354}.sub{margin-top:9px;color:#747d83;font:700 8px/1.5 "JetBrains Mono",ui-monospace,monospace;letter-spacing:.16em;text-transform:uppercase}.bar{height:2px;margin:22px auto 0;overflow:hidden;border:1px solid rgba(255,255,255,.06);background:#080a0c}.bar:after{content:"";display:block;width:32%;height:100%;background:#d4a354;animation:load 1.05s ease-in-out infinite alternate}@keyframes load{to{transform:translateX(215%)}}iframe{width:100%;height:100%;border:0;background:#0b0d0f}
  </style>
</head>
<body>
  <div id="boot"><div class="boot-card"><div class="logo">Neu<span>sic</span></div><div class="sub">Recording & Mix Workflow · Initializing</div><div class="bar"></div></div></div>
  <iframe id="studio" src="core.html" title="Neusic digital audio workstation" allow="microphone; autoplay; clipboard-read; clipboard-write; midi"></iframe>
  <script>
    const frame=document.getElementById('studio');
    frame.addEventListener('load',async()=>{
      const d=frame.contentDocument;
      const css=['css/13-workspace-ux.css','css/14-production-integrity.css','css/15-mobile-first.css','css/16-project-safety.css','css/17a-studio-foundation.css','css/17b-studio-navigation.css','css/17c-studio-controls.css','css/17d-studio-mixer-mobile.css','css/18-producer-flow.css','css/19-professional-arranger.css','css/20a-hyperreal-shell.css','css/20b-hyperreal-tracks.css','css/20c-hyperreal-creator.css','css/21-production-copilot.css','css/22-premium-studio.css','css/23-recording-mix-workflow.css'];
      css.forEach(href=>{if(!d.querySelector(`link[href="${href}"]`)){const link=d.createElement('link');link.rel='stylesheet';link.href=href;d.head.appendChild(link);}});
      const load=src=>new Promise((resolve,reject)=>{if(d.querySelector(`script[src="${src}"]`))return resolve();const script=d.createElement('script');script.src=src;script.onload=resolve;script.onerror=reject;d.body.appendChild(script);});
      try{
        for(const src of ['js/22-workspace-ux.js','js/23-production-integrity.js','js/24-mobile-first.js','js/25-project-safety.js','js/26-producer-flow.js','js/27-producer-flow-hardening.js','js/28-professional-arranger.js','js/29-arranger-recovery-sync.js','js/30-track-engine.js','js/31-midi-clips.js','js/32-track-workspace.js','js/33-production-copilot.js','js/34-theme-personalization.js','js/35-recording-mix-workflow.js'])await load(src);
      }finally{
        document.getElementById('boot').style.display='none';
      }
    });
  </script>
</body>
</html>
