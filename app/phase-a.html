<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#11101b">
  <title>Neusic Studio</title>
  <style>
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#11101b;font-family:Inter,system-ui,sans-serif}
    #boot{position:fixed;inset:0;z-index:2;display:grid;place-items:center;color:#f5f3ff;background:radial-gradient(circle at 50% 35%,#302545,#11101b 58%)}
    .boot-card{text-align:center}.logo{font-size:34px;font-weight:850;letter-spacing:-1.5px}.logo span{color:#a78bfa}
    .sub{margin-top:8px;color:#a7a2b8;font-size:12px;letter-spacing:.13em;text-transform:uppercase}
    .bar{width:210px;height:3px;margin:22px auto 0;border-radius:9px;overflow:hidden;background:#29243a}
    .bar:after{content:"";display:block;width:45%;height:100%;background:#a78bfa;animation:load 1.1s ease-in-out infinite alternate}
    @keyframes load{to{transform:translateX(125%)}}
    iframe{width:100%;height:100%;border:0;background:#11101b}
  </style>
</head>
<body>
  <div id="boot"><div class="boot-card"><div class="logo">Neu<span>sic</span></div><div class="sub">Loading mobile-first studio</div><div class="bar"></div></div></div>
  <iframe id="studio" src="core.html" title="Neusic digital audio workstation" allow="microphone; autoplay; clipboard-read; clipboard-write; midi"></iframe>
  <script>
    const frame=document.getElementById('studio');
    frame.addEventListener('load',async()=>{
      const d=frame.contentDocument;
      const css=['css/13-workspace-ux.css','css/14-production-integrity.css','css/15-mobile-first.css','css/16-project-safety.css'];
      css.forEach(href=>{if(!d.querySelector(`link[href="${href}"]`)){const link=d.createElement('link');link.rel='stylesheet';link.href=href;d.head.appendChild(link);}});
      const load=src=>new Promise((resolve,reject)=>{if(d.querySelector(`script[src="${src}"]`))return resolve();const script=d.createElement('script');script.src=src;script.onload=resolve;script.onerror=reject;d.body.appendChild(script);});
      try{
        for(const src of ['js/22-workspace-ux.js','js/23-production-integrity.js','js/24-mobile-first.js','js/25-project-safety.js'])await load(src);
      }finally{
        document.getElementById('boot').style.display='none';
      }
    });
  </script>
</body>
</html>
