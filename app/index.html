<body data-product="lab" class="nw-fullbleed">
<div id="app">

<!-- TOP BAR -->
<div id="topbar">
  <span class="brand">Neusic</span>
  <div class="tb-sep"></div>

  <div class="tb-btn-wrap">
    <button class="tb-btn" id="btn-undo" onclick="undo()" title="Undo (Ctrl+Z)">↩</button>
    <div class="undo-count" id="undo-badge" style="display:none">0</div>
  </div>
  <div class="tb-btn-wrap">
    <button class="tb-btn" id="btn-redo" onclick="redo()" title="Redo (Ctrl+Y)">↪</button>
    <div class="undo-count" id="redo-badge" style="display:none">0</div>
  </div>

  <div class="tb-sep"></div>

  <button class="tb-btn" id="btn-rew" onclick="rewind()" title="Rewind (Home)">⏮</button>
  <button class="tb-btn" id="btn-play" onclick="togglePlay()" title="Play/Pause (Space)">▶</button>
  <button class="tb-btn" id="btn-rec"  onclick="toggleRecord()" title="Record (R)">⏺</button>

  <div class="tb-sep"></div>

  <div class="chip">
    <div class="chip-main" id="time-disp">00:18.450</div>
    <div class="chip-sub"  id="bar-disp">BAR 9 · BEAT 1</div>
  </div>

  <div class="chip bpm-chip" onclick="bpmTap(event)" title="Click ± to adjust BPM">
    <div class="chip-main" id="bpm-disp">120</div>
    <div class="chip-sub">BPM</div>
  </div>

  <div class="tb-spacer"></div>

  <div class="zoom-group">
    <button class="zoom-btn" onclick="zoom(-1)" title="Zoom out">−</button>
    <span class="zoom-read" id="zoom-read">1.0×</span>
    <button class="zoom-btn" onclick="zoom(1)"  title="Zoom in">+</button>
  </div>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="saveProjectToFile()" title="Save project (.json)">💾</button>
  <button class="tb-btn" onclick="triggerLoadProject()" title="Load project (.json)">📂</button>
  <input type="file" id="project-file-input" accept="application/json,.json" style="display:none"
         onchange="loadProjectFromFile(this.files[0]);this.value='';">
  <button class="tb-btn" onclick="exportWavFile()" title="Export full mix (.wav)">⬇</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-sb" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
</div>

<!-- MAIN -->
<div id="main">

  <!-- SIDEBAR (desktop) -->
  <div id="sidebar">
    <div class="sb-section">Tracks</div>
    <div class="sb-list" id="sb-list"></div>
    <button class="sidebar-add" onclick="addTrack()" style="margin:5px 6px;padding:7px;border-radius:var(--rsm);border:1px dashed var(--txt3);background:none;color:var(--txt2);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;width:calc(100% - 12px);transition:all .12s;" onmouseover="this.style.borderColor='var(--acc)';this.style.color='var(--acc)';" onmouseout="this.style.borderColor='var(--txt3)';this.style.color='var(--txt2)';">＋ Add Track</button>
    <div class="sb-nav" id="sb-nav"></div>
  </div>

  <!-- CENTER -->
  <div id="center">

    <!-- Overview -->
    <div id="overview" onmousedown="seekOv(event)" ontouchstart="seekOvT(event)">
      <div class="ov-segs" id="ov-segs"></div>
      <div class="ov-window" id="ov-win" style="left:16%;width:30%"></div>
      <div class="ov-cursor" id="ov-cur" style="left:30%"></div>
    </div>

    <!-- Ruler -->
    <div id="ruler">
      <div class="ruler-pad" id="ruler-pad" style="width:var(--hdr-w)"></div>
      <canvas class="ruler-canvas" id="ruler-canvas"></canvas>
    </div>

    <!-- Tracks -->
    <div id="tracks-area">
      <div id="tracks-scroll">
        <div id="tracks-inner">
          <div class="playhead" id="playhead"></div>
        </div>
        <div class="add-track-row" onclick="addTrack()">
          <span style="font-size:18px;font-weight:300">＋</span> Add Track
        </div>
      </div>
    </div>

  </div><!-- /center -->
</div><!-- /main -->

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tool-btn active" id="tb-drums"  onclick="openDrawer('drums')"> <span class="ico">🥁</span>Drums</button>
  <button class="tool-btn"        id="tb-piano"  onclick="openDrawer('piano')"> <span class="ico">🎹</span>Piano Roll</button>
  <button class="tool-btn"        id="tb-sampler"onclick="openDrawer('sampler')"><span class="ico">✂️</span>Sampler</button>
  <button class="tool-btn"        id="tb-browser"onclick="openDrawer('browser')"><span class="ico">🗂</span>Browser</button>
  <button class="tool-btn"        id="tb-fx"     onclick="openDrawer('fx')">    <span class="ico">🎚️</span>Effects</button>
  <button class="tool-btn"        id="tb-mixer"  onclick="openDrawer('mixer')"> <span class="ico">🎛️</span>Mixer</button>
  <button class="tool-btn"        id="tb-auto"   onclick="openDrawer('auto')">  <span class="ico">〜</span>Automation</button>
  <button class="tool-btn"        id="tb-rec"    onclick="openDrawer('rec')">   <span class="ico">🎤</span>Record</button>
</div>

<!-- DRAWER HANDLE -->
<div id="drawer-handle" onclick="toggleDrawer()"><div class="drawer-pill"></div></div>

<!-- DRAWER -->
<div id="drawer" class="open">
  <div class="dtabs" id="dtabs"></div>
  <div class="dpanels">
    <div class="dpanel active" id="dp-drums"></div>
    <div class="dpanel"        id="dp-piano"></div>
    <div class="dpanel"        id="dp-sampler"></div>
    <div class="dpanel"        id="dp-fx"></div>
    <div class="dpanel"        id="dp-mixer"></div>
    <div class="dpanel"        id="dp-auto"></div>
    <div class="dpanel"        id="dp-browser"></div>
    <div class="dpanel"        id="dp-rec"></div>
  </div>
</div>

<!-- MOBILE NAV -->
<div id="mobile-nav">
  <button class="mob-btn" onclick="mobNav('projects',this)"><span class="mob-ico">📂</span><span>Projects</span></button>
  <button class="mob-btn" onclick="mobNav('browser',this)"><span class="mob-ico">🎵</span><span>Browser</span></button>
  <button class="mob-btn active" id="mob-main">
    <div class="mob-center-wrap">🎛️</div><span>Neusic</span>
  </button>
  <button class="mob-btn" onclick="mobNav('record',this)"><span class="mob-ico">🎤</span><span>Record</span></button>
  <button class="mob-btn" onclick="mobNav('settings',this)"><span class="mob-ico">⚙️</span><span>Settings</span></button>
</div>

</div><!-- /app -->

<!-- Context menu -->
<div id="ctx-menu">
  <div class="ctx-item" onclick="ctxSplit()">✂ Split at playhead</div>
  <div class="ctx-item" onclick="ctxDuplicate()">⧉ Duplicate</div>
  <div class="ctx-item" onclick="ctxReverse()">⇆ Reverse</div>
  <div class="ctx-item" onclick="ctxNormalize()">⬆ Normalize</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" onclick="ctxFadeIn()">🌅 Fade in</div>
  <div class="ctx-item" onclick="ctxFadeOut()">🌆 Fade out</div>
  <div class="ctx-item" onclick="ctxClipGain()">🔊 Clip gain…</div>
  <div class="ctx-item" onclick="ctxPitchShift()">🎵 Pitch shift…</div>
  <div class="ctx-item" onclick="ctxStretch()">⏩ Stretch…</div>
  <div class="ctx-item" onclick="ctxCrossfade()">⋈ Crossfade with next</div>
  <div class="ctx-item" onclick="ctxBounce()">⬇ Bounce to clip</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" onclick="ctxDelete()">🗑 Delete</div>
</div>

<!-- Note properties popover (piano roll) -->
<div id="note-popover">
  <div class="np-hdr">
    <span class="np-notename" id="np-notename">C4</span>
    <span class="np-midinum" id="np-midinum">MIDI 60</span>
    <button class="np-close" onclick="closeNotePopover()">✕</button>
  </div>
  <div class="np-row"><span class="np-lbl">Beat</span><input class="np-val" id="np-beat" type="number" min="0" step="0.25" onchange="applyNoteEdit()"></div>
  <div class="np-row"><span class="np-lbl">Length</span><input class="np-val" id="np-len"  type="number" min="0.125" step="0.125" onchange="applyNoteEdit()"></div>
  <div class="np-row"><span class="np-lbl">Velocity</span><input class="np-val" id="np-vel"  type="number" min="1" max="127" step="1" onchange="applyNoteEdit()"></div>
  <div class="np-btns">
    <button class="np-btn prim" onclick="prPlayNoteFromPopover()">▶ Preview</button>
    <button class="np-btn" onclick="applyNoteEdit();closeNotePopover()">Apply</button>
    <button class="np-btn danger" onclick="deleteNoteFromPopover()">Delete</button>
  </div>
</div>

<div id="toast"></div>
<div id="sel-box"></div>
