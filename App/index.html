<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Opening NeusicLab…</title>
</head>
<body>
<script>
fetch('../app/index.html', { cache: 'no-store' })
  .then(function (response) {
    if (!response.ok) throw new Error('Unable to load NeusicLab');
    return response.text();
  })
  .then(function (html) {
    html = html.replace('<head>', '<head><base href="../app/">');
    document.open();
    document.write(html);
    document.close();
  })
  .catch(function () {
    document.body.innerHTML = '<p>NeusicLab could not load. <a href="../app/">Open the studio</a>.</p>';
  });
</script>
</body>
</html>
